            topCanvas.setPointerCapture(e.pointerId);
            last = p;

            if (S.tool === 'airbrush') {
                startAirbrush(p, e);
            } else if (S.tool === 'splatter') {
                startSplatter(p, e);
            } else if (S.tool === 'splat') {
                inkStampSplat(ctxs[S.activeLayer], S.brushColor, splatSizeFor(e), p.x, p.y);
                lastSplatStamp = p;
            } else if (BRUSH_PRESETS[S.tool]) {
                const preset = BRUSH_PRESETS[S.tool];
                presetState = { residual: 0, dir: undefined };
                if (preset.wet) { ensureWetLayers(); wetActive = true; }
                const w = presetWidthFor(preset, presetBaseSize(preset), e);
                stampAlongSegment(preset.wet ? wetBufferCtx : ctxs[S.activeLayer], S.tool, S.brushColor, p, p, w, w, presetState);
                if (preset.wet) blitWetPreview(preset);
                lastWidth = w;
            } else if (S.tool === 'quill') {
                quillSmooth = null;
                lastQuillTs = e.timeStamp;
                const w = quillWidthFor(e, p, null);
                quillInkEffects(p, w, true);
                drawSegment(p, { x: p.x + 0.01, y: p.y + 0.01 }, w, w);
                lastWidth = w;
            } else if (S.tool === 'brush') {
                brushStroke = [];
                lastBrushPressure = e.pressure > 0 ? e.pressure : 0.5;
                const w = widthFor(e) * brushTaperInFactor(0);
                brushStroke.push({ x: p.x, y: p.y, width: w });
                drawSegment(p, { x: p.x + 0.01, y: p.y + 0.01 }, w, w);
                lastWidth = w;
            } else {
                const w = widthFor(e);
                drawSegment(p, { x: p.x + 0.01, y: p.y + 0.01 }, w, w); // dot on tap
                lastWidth = w;
            }
        });

        topCanvas.addEventListener('pointermove', e => {
            if (e.pointerId !== activePointer) return;
            e.preventDefault();

            // Airbrush ignores the path entirely — the spray loop reads whatever
            // target/pressure was last set here, independent of how often (or
            // rarely) pointermove actually fires.
            if (S.tool === 'airbrush') {
                airbrushTarget = pos(e);
                lastAirbrushPressure = airbrushPressureFor(e);
                return;
            }
            if (S.tool === 'splatter') {
                splatterTarget = pos(e);
                lastSplatterPressure = splatterPressureFor(e);
                return;
            }

            // Coalesced events: Apple Pencil samples at 240Hz — much smoother curves
            const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
            for (const ev of events) {
                const p = pos(ev);
                if (S.tool === 'brush') {
                    const w = widthFor(ev) * brushTaperInFactor(brushStroke.length);
                    brushStroke.push({ x: p.x, y: p.y, width: w });
                    drawSegment(last, p, lastWidth, w);
                    lastWidth = w;
                } else if (S.tool === 'splat') {
                    // No line between stamps — just a fresh blot each time the
                    // pointer travels far enough from the previous one.
                    if (lastSplatStamp && Math.hypot(p.x - lastSplatStamp.x, p.y - lastSplatStamp.y) >= S.splatSize * RENDER_SCALE * 1.5) {
                        inkStampSplat(ctxs[S.activeLayer], S.brushColor, splatSizeFor(ev), p.x, p.y);
                        lastSplatStamp = p;
                    }
                } else if (BRUSH_PRESETS[S.tool]) {
                    const preset = BRUSH_PRESETS[S.tool];
                    const w = presetWidthFor(preset, presetBaseSize(preset), ev);
                    stampAlongSegment(wetActive ? wetBufferCtx : ctxs[S.activeLayer], S.tool, S.brushColor, last, p, lastWidth, w, presetState);
                    lastWidth = w;
                } else if (S.tool === 'quill') {
                    const w = quillWidthFor(ev, p, last);
                    drawSegment(last, p, lastWidth, w);
                    quillInkEffects(p, w, false);
                    lastWidth = w;
                } else {
                    const w = widthFor(ev);
                    drawSegment(last, p, lastWidth, w);
                    lastWidth = w;
                }
                last = p;
            }
            // One preview blit per event batch (not per coalesced point)
            if (wetActive) blitWetPreview(BRUSH_PRESETS[S.tool]);
        });

        const stop = e => {
            if (e.pointerId === activePointer) {
                if (S.tool === 'brush') finishBrushTaper();
                if (S.tool === 'airbrush') stopAirbrush();
                if (S.tool === 'splatter') stopSplatter();
                if (S.tool === 'splat') lastSplatStamp = null;
                if (S.tool === 'quill' && last && quillSmooth !== null && quillSmooth > 1.1) {
                    // Lifting while moving slowly leaves a pool where the wet
                    // nib sat — a fast flick off the page leaves nothing.
                    inkStampQuillBlob(ctxs[S.activeLayer], S.brushColor, lastWidth * (1.0 + Math.random() * 0.5), last.x, last.y);
                }
                if (wetActive && BRUSH_PRESETS[S.tool]) finishWetStroke(BRUSH_PRESETS[S.tool]);
                presetState = null;
                activePointer = null;
                last = null;
            }
        };
        topCanvas.addEventListener('pointerup', stop);
        topCanvas.addEventListener('pointercancel', stop);
        topCanvas.addEventListener('contextmenu', e => e.preventDefault()); // no long-press menu on tablets

        // Tool picker: a single trigger button that expands into a dropdown of
        // the other tools, rather than three always-visible buttons — keeps the
        // toolbar compact.
        const toolTrigger = document.getElementById('toolTrigger');
        const toolMenu = document.getElementById('toolMenu');
        const toolTriggerLabel = document.getElementById('toolTriggerLabel');
        const toolTriggerIcon = document.getElementById('toolTriggerIcon');

        function selectTool(tool) {
            S.tool = tool;
            toolTriggerIcon.src = TOOL_META[tool].icon;
            toolTriggerLabel.textContent = TOOL_META[tool].label;
            document.querySelectorAll('.toolMenuItem').forEach(btn => {
                btn.classList.toggle('bg-gray-100', btn.dataset.tool === tool);
            });
            topCanvas.style.cursor = tool === 'fill' ? 'cell' : 'crosshair';
            document.getElementById('brushHint').classList.toggle('hidden', tool !== 'brush');

            const cfg = sizeConfigFor(tool);
            const slider = document.getElementById('sizeSlider');
            slider.min = cfg.min;
            slider.max = cfg.max;
            slider.value = cfg.value;
            document.getElementById('sizeLabel').textContent = cfg.value;
            document.getElementById('sizeLabelText').textContent = cfg.label;

            toolMenu.classList.add('hidden');
        }
        toolTrigger.addEventListener('click', e => {
            e.stopPropagation();
            toolMenu.classList.toggle('hidden');
        });
        // Delegated (not per-item) so the menu's contents can be rebuilt in
        // place — e.g. when the async account fetch finishes after this
        // screen rendered and the subscriber brushes need to appear.
        toolMenu.addEventListener('click', e => {
            const btn = e.target.closest('.toolMenuItem');
            if (btn) selectTool(btn.dataset.tool);
        });
        // Plain assignment (not addEventListener) so re-running setupCanvas each
        // round replaces the old handler instead of stacking a new one — same
        // pattern as window.onresize below.
        document.onclick = e => {
            if (!toolMenu.contains(e.target) && e.target !== toolTrigger) toolMenu.classList.add('hidden');
        };

        // Layer buttons
        document.querySelectorAll('.layerBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                S.activeLayer = Number(btn.dataset.layer);
                document.querySelectorAll('.layerBtn').forEach(b => {
                    b.classList.toggle('active', b === btn);
                });
            });
        });

        // Colors
        function selectColor(color) {
            S.brushColor = color;
            document.querySelectorAll('.colorBtn').forEach(b => {
                b.className = `colorBtn w-7 h-7 rounded-full border-2 ${b.dataset.color === color ? 'border-gray-900 scale-110' : 'border-gray-200'}`;
            });
            // Picking a color switches off the eraser (common expectation)
            if (S.tool === 'eraser') selectTool('pen');
        }
        document.querySelectorAll('.colorBtn').forEach(btn => {
            btn.addEventListener('click', () => selectColor(btn.dataset.color));
        });
        document.getElementById('customColor').addEventListener('input', e => selectColor(e.target.value));

        document.getElementById('sizeSlider').addEventListener('input', e => {
            const val = Number(e.target.value);
            if (S.tool === 'eraser') S.eraserSize = val;
            else if (S.tool === 'pencil') S.pencilSize = val;
            else if (S.tool === 'brush') S.brushSize = val;
            else if (S.tool === 'airbrush') S.airbrushSize = val;
            else if (S.tool === 'splat') S.splatSize = val;
            else if (S.tool === 'splatter') S.splatterSize = val;
            else if (S.tool === 'quill') S.quillSize = val;
            else if (BRUSH_PRESETS[S.tool]) S.presetSizes[S.tool] = val;
            else S.penSize = val;
            document.getElementById('sizeLabel').textContent = val;
        });

        function performUndo() {
            const layer = S.activeLayer;
            const snap = S.undoStacks[layer].pop();
            if (!snap) return;
            const ctx = ctxs[layer];
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(img, 0, 0);
            };
            img.src = snap;
        }
        document.getElementById('undoBtn').addEventListener('click', performUndo);

        // Ctrl+Z (Windows/Linux) or Cmd+Z (Mac) — not the Shift variant (redo),
        // since there's no redo stack to pair it with. Plain assignment (not
        // addEventListener) so re-running setupCanvas each round replaces the
        // old handler instead of stacking a new one, same as document.onclick
        // below; the screen check keeps it inert once the user navigates away.
        document.onkeydown = e => {
            if (S.screen !== 'draw') return;
            if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                performUndo();
            }
        };
        document.getElementById('clearBtn').addEventListener('click', () => {
            pushUndo();
            ctxs[S.activeLayer].clearRect(0, 0, CANVAS_W, CANVAS_H);
        });
        document.getElementById('submitBtn').addEventListener('click', submitDrawing);
    }

    // Scanline-free BFS flood fill with tolerance (handles antialiased stroke edges).
    // Matches on RGBA (alpha included) so it respects transparent regions as boundaries too.
    function floodFill(ctx, startX, startY, hexColor) {
        const W = CANVAS_W, H = CANVAS_H;
        if (startX < 0 || startY < 0 || startX >= W || startY >= H) return;

        const img = ctx.getImageData(0, 0, W, H);
        const d = img.data;

        const fr = parseInt(hexColor.slice(1, 3), 16);
        const fg = parseInt(hexColor.slice(3, 5), 16);
        const fb = parseInt(hexColor.slice(5, 7), 16);

        const si = (startY * W + startX) * 4;
        const tr = d[si], tg = d[si + 1], tb = d[si + 2], ta = d[si + 3];

        // Clicked a pixel that's already the fill color — nothing to do
        if (tr === fr && tg === fg && tb === fb && ta === 255) return;

        const TOL = 32;
        function matches(i) {
            return Math.abs(d[i] - tr) <= TOL &&
                   Math.abs(d[i + 1] - tg) <= TOL &&
                   Math.abs(d[i + 2] - tb) <= TOL &&
                   Math.abs(d[i + 3] - ta) <= TOL;
        }

        const visited = new Uint8Array(W * H);
        const stack = [startX + startY * W];
        visited[startX + startY * W] = 1;

        while (stack.length) {
            const p = stack.pop();
            const x = p % W, y = (p / W) | 0;
            const i = p * 4;
            d[i] = fr; d[i + 1] = fg; d[i + 2] = fb; d[i + 3] = 255;

            if (x > 0 && !visited[p - 1] && matches(i - 4)) { visited[p - 1] = 1; stack.push(p - 1); }
            if (x < W - 1 && !visited[p + 1] && matches(i + 4)) { visited[p + 1] = 1; stack.push(p + 1); }
            if (y > 0 && !visited[p - W] && matches(i - W * 4)) { visited[p - W] = 1; stack.push(p - W); }
            if (y < H - 1 && !visited[p + W] && matches(i + W * 4)) { visited[p + W] = 1; stack.push(p + W); }
        }

        ctx.putImageData(img, 0, 0);
    }

    // ---------- INK SPLOTCH BRUSHES (subscriber set) ----------
    // Shared stamp primitives for the three ink tools (Ink Splat, Ink
    // Splatter, Wet Quill). Written once with explicit ctx/color args (the
    // same convention as the oc* functions below) and called from BOTH
    // drawing engines — these are new tools, so unlike the duplicated legacy
    // primitives there's no proven behavior at risk in sharing them. Every
    // stamp is randomized: two stamps of the same size never look identical,
    // which is what makes ink read as ink.

    // One irregular ink blot: a wobbly closed blob plus a scatter of
    // satellite droplets, the bigger ones with a teardrop tail pointing back
    // at the blob like a real splat's throw-off.
    function inkStampSplat(ctx, color, size, x, y) {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = color;

        const n = 10 + Math.floor(Math.random() * 5);
        const stretch = 0.78 + Math.random() * 0.45; // slight oval, random orientation
        const rot = Math.random() * Math.PI;
        const cosR = Math.cos(rot), sinR = Math.sin(rot);
        const pts = [];
        for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2;
            const r = size * (0.55 + Math.random() * 0.45);
            const ex = Math.cos(a) * r * stretch;
            const ey = Math.sin(a) * r / stretch;
            pts.push({ x: x + ex * cosR - ey * sinR, y: y + ex * sinR + ey * cosR });
        }
        // Smooth the polygon by curving through edge midpoints — straight
        // lines between random radii read as a gemstone, not a liquid.
        const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
        ctx.beginPath();
        let m = mid(pts[n - 1], pts[0]);
        ctx.moveTo(m.x, m.y);
        for (let i = 0; i < n; i++) {
            const m2 = mid(pts[i], pts[(i + 1) % n]);
            ctx.quadraticCurveTo(pts[i].x, pts[i].y, m2.x, m2.y);
        }
        ctx.closePath();
        ctx.fill();

        const drops = 3 + Math.floor(Math.random() * 6);
        for (let i = 0; i < drops; i++) {
            const a = Math.random() * Math.PI * 2;
            const dist = size * (1.05 + Math.random() * 0.95);
            const dr = size * (0.05 + Math.pow(Math.random(), 2) * 0.16);
            const dx = x + Math.cos(a) * dist, dy = y + Math.sin(a) * dist;
            ctx.beginPath();
            ctx.arc(dx, dy, dr, 0, Math.PI * 2);
            ctx.fill();
            if (dr > size * 0.09) {
                const tailLen = dr * (2 + Math.random() * 1.5);
                const perp = a + Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(dx + Math.cos(perp) * dr * 0.7, dy + Math.sin(perp) * dr * 0.7);
                ctx.lineTo(dx - Math.cos(a) * tailLen, dy - Math.sin(a) * tailLen);
                ctx.lineTo(dx - Math.cos(perp) * dr * 0.7, dy - Math.sin(perp) * dr * 0.7);
                ctx.closePath();
                ctx.fill();
            }
        }
    }

    // One frame's worth of flicked droplets. Where the airbrush is a dense
    // mist of translucent specks biased toward the center, this is the
    // opposite: a few chunky, fully-opaque drops spread across the whole
    // radius, elongated along their throw direction — the look of snapping a
    // loaded brush at the page.
    function inkStampSplatterFrame(ctx, color, radius, target, pressure) {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = color;
        const drops = 1 + Math.round(pressure * 3);
        for (let i = 0; i < drops; i++) {
            const a = Math.random() * Math.PI * 2;
            const dist = Math.pow(Math.random(), 0.7) * radius;
            const dx = target.x + Math.cos(a) * dist;
            const dy = target.y + Math.sin(a) * dist;
            const dr = Math.max(0.4, radius * (0.02 + Math.pow(Math.random(), 3.2) * 0.14));
            const len = dr * (1 + Math.random() * 1.6); // elongated along the flick
            ctx.globalAlpha = 0.85 + Math.random() * 0.15;
            ctx.beginPath();
            ctx.ellipse(dx, dy, len, dr, a, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // A small pooling blob — a mini splat without satellites. The quill drops
    // these where a stroke starts, lingers, or ends (wet ink pooling), and a
    // tiny version doubles as the occasional stray fleck beside the line.
    function inkStampQuillBlob(ctx, color, size, x, y) {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = color;
        const n = 8;
        const pts = [];
        for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2;
            const r = size * (0.72 + Math.random() * 0.28);
            pts.push({ x: x + Math.cos(a) * r, y: y + Math.sin(a) * r });
        }
        const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
        ctx.beginPath();
        let m = mid(pts[n - 1], pts[0]);
        ctx.moveTo(m.x, m.y);
        for (let i = 0; i < n; i++) {
            const m2 = mid(pts[i], pts[(i + 1) % n]);
            ctx.quadraticCurveTo(pts[i].x, pts[i].y, m2.x, m2.y);
        }
        ctx.closePath();
        ctx.fill();
    }

    // ---------- PARAMETRIC STAMP ENGINE (subscriber brush families) ----------
    // One data-driven engine for the Watercolor / Charcoal / Pastel families:
    // every brush is a row in BRUSH_PRESETS (tip texture, spacing, opacity,
    // pressure dynamics), rendered by stampAlongSegment() walking the stroke
    // and stamping cached tinted tip sprites. New brushes are new rows, not
    // new code — which is what a "new brushes as they release" subscription
    // needs. Tips are procedural (no assets fetched at runtime); parameter
    // feel is tuned by eye against Krita/MyPaint's CC0/public-domain preset
    // packs, but all code here is original — Krita's own engines are GPL C++
    // and were never copied.
    //
    // `wet: true` presets (watercolor washes) don't paint the layer directly:
    // stamps accumulate in an offscreen "wet buffer" at full strength during
    // the stroke (previewed on a transparent overlay canvas), then composite
    // onto the layer ONCE on lift-off with globalAlpha = preset.opacity and
    // 'multiply' — so a single stroke reads as one even wash with a darker
    // wet rim, and separate overlapping strokes genuinely darken each other
    // the way layered watercolor does.
    const BRUSH_PRESETS = {
        wc_wash:      { family: 'Watercolor', label: 'Wet Wash',     tip: 'wetDisc',     spacing: 0.35, opacity: 0.38, wet: true,  sizeRange: [8, 80],  size: 30, pressureSize: 0.5, scatter: 0.05, angle: 'none' },
        wc_bleed:     { family: 'Watercolor', label: 'Soft Bleed',   tip: 'softDisc',    spacing: 0.30, opacity: 0.30, wet: true,  sizeRange: [10, 90], size: 42, pressureSize: 0.5, scatter: 0.18, angle: 'none' },
        wc_dry:       { family: 'Watercolor', label: 'Dry Brush',    tip: 'toothCoarse', spacing: 0.22, opacity: 0.55, wet: false, sizeRange: [6, 60],  size: 22, pressureSize: 0.6, scatter: 0.04, angle: 'follow' },
        wc_granulate: { family: 'Watercolor', label: 'Granulating',  tip: 'granDisc',    spacing: 0.35, opacity: 0.42, wet: true,  sizeRange: [8, 80],  size: 32, pressureSize: 0.5, scatter: 0.06, angle: 'none' },
        // Charcoal: dry stamping, low per-stamp alpha that builds up with
        // passes, grain carved from the tip, texture rotating with travel.
        ch_willow:     { family: 'Charcoal', label: 'Willow',          tip: 'toothSoft', spacing: 0.25, opacity: 1, stampAlpha: 0.28, wet: false, sizeRange: [6, 70],  size: 26, pressureSize: 0.45, scatter: 0.06, angle: 'follow' },
        ch_compressed: { family: 'Charcoal', label: 'Compressed',      tip: 'toothFine', spacing: 0.22, opacity: 1, stampAlpha: 0.7,  wet: false, sizeRange: [4, 60],  size: 18, pressureSize: 0.5,  scatter: 0.04, angle: 'follow' },
        ch_pencil:     { family: 'Charcoal', label: 'Charcoal Pencil', tip: 'toothFine', spacing: 0.3,  opacity: 1, stampAlpha: 0.55, wet: false, sizeRange: [2, 24],  size: 8,  pressureSize: 0.6,  scatter: 0.03, angle: 'follow' },
        ch_stick:      { family: 'Charcoal', label: 'Side Stick',      tip: 'flatStick', spacing: 0.15, opacity: 1, stampAlpha: 0.5,  wet: false, sizeRange: [12, 90], size: 40, pressureSize: 0.4,  scatter: 0.02, angle: 'follow' },
        // Pastel: near-opaque waxy/chalky stamps with crumbly edges and
        // per-stamp color jitter (each cached tip variant carries a slightly
        // nudged tint, so the wobble costs nothing at stamp time).
        op_soft:    { family: 'Pastel', label: 'Soft Pastel', tip: 'pastelTip',     spacing: 0.28, opacity: 1, stampAlpha: 0.75, colorJitter: 0.05, wet: false, sizeRange: [6, 70],  size: 24, pressureSize: 0.5, scatter: 0.05, angle: 'follow' },
        op_heavy:   { family: 'Pastel', label: 'Oil Pastel',  tip: 'pastelHeavy',   spacing: 0.22, opacity: 1, stampAlpha: 0.95, colorJitter: 0.07, wet: false, sizeRange: [6, 70],  size: 26, pressureSize: 0.5, scatter: 0.03, angle: 'follow' },
        op_scumble: { family: 'Pastel', label: 'Scumble',     tip: 'pastelScumble', spacing: 0.3,  opacity: 1, stampAlpha: 0.6,  colorJitter: 0.06, wet: false, sizeRange: [10, 90], size: 40, pressureSize: 0.4, scatter: 0.12, angle: 'follow' },
        op_chalk:   { family: 'Pastel', label: 'Chalk',       tip: 'toothSoft',     spacing: 0.3,  opacity: 1, stampAlpha: 0.4,  colorJitter: 0.08, wet: false, sizeRange: [6, 70],  size: 26, pressureSize: 0.5, scatter: 0.06, angle: 'follow' },
    };
    const FAMILY_ICONS = {
        Watercolor: '/graphics/Exquisite-corpse-tool-icons-11-WATERCOLOR.svg',
        Charcoal: '/graphics/Exquisite-corpse-tool-icons-12-CHARCOAL.svg',
        Pastel: '/graphics/Exquisite-corpse-tool-icons-13-PASTEL.svg',
    };
    // Presets register into TOOL_META so everything that resolves a tool's
    // icon/label (trigger button, selectTool, menu) keeps working unchanged.
    for (const [id, p] of Object.entries(BRUSH_PRESETS)) {
        TOOL_META[id] = { icon: FAMILY_ICONS[p.family], label: p.label, subscriberOnly: true, family: p.family };
    }

    // ---- Tip sprite factory ----
    // Tips are built as black alpha-profile masks, tinted via 'source-in',
    // and cached per (tip, color, size bucket, variant). All stamping is
    // drawImage of these cached sprites — never per-stamp path drawing —
    // which is what keeps textured brushes usable at the 300 DPI canvas.
    const TIP_VARIANTS = 4; // pre-baked randomizations per textured tip, picked per stamp
    const tipCache = new Map();

    function buildTipMask(tip, s) {
        const c = document.createElement('canvas');
        c.width = c.height = s;
        const ctx = c.getContext('2d');
        const half = s / 2;
        if (tip === 'pastelTip' || tip === 'pastelHeavy' || tip === 'pastelScumble') {
            // Near-opaque disc with a crumbly bitten edge — pastel doesn't
            // feather like a wet wash, it breaks up.
            ctx.fillStyle = 'rgba(0,0,0,0.95)';
            ctx.beginPath();
            ctx.arc(half, half, half * 0.92, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            // Rim bites
            const bites = Math.max(8, Math.round(s / 3));
            for (let i = 0; i < bites; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = half * (0.8 + Math.random() * 0.25);
                ctx.globalAlpha = 0.7 + Math.random() * 0.3;
                ctx.beginPath();
                ctx.arc(half + Math.cos(a) * d, half + Math.sin(a) * d, Math.max(0.8, s * (0.04 + Math.random() * 0.08)), 0, Math.PI * 2);
                ctx.fill();
            }
            if (tip === 'pastelScumble') {
                // Big interior holes — broken coverage that lets the layer
                // underneath show through.
                const holes = Math.max(10, Math.round(s * s / 45));
                for (let i = 0; i < holes; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const d = Math.sqrt(Math.random()) * half * 0.85;
                    ctx.globalAlpha = 0.6 + Math.random() * 0.4;
                    ctx.beginPath();
                    ctx.arc(half + Math.cos(a) * d, half + Math.sin(a) * d, Math.max(0.8, s * (0.05 + Math.random() * 0.09)), 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (tip === 'pastelHeavy') {
                // Thin horizontal grooves: rotated with travel at stamp time,
                // they read as waxy bristle streaks running along the stroke.
                const grooves = Math.max(3, Math.round(s / 8));
                for (let i = 0; i < grooves; i++) {
                    const gy = Math.random() * s;
                    ctx.globalAlpha = 0.25 + Math.random() * 0.3;
                    ctx.fillRect(0, gy, s, Math.max(0.5, s * 0.02));
                }
            } else {
                // Soft pastel: light chalky pitting
                const pits = Math.max(10, Math.round(s * s / 30));
                for (let i = 0; i < pits; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const d = Math.sqrt(Math.random()) * half * 0.85;
                    ctx.globalAlpha = 0.25 + Math.random() * 0.35;
                    ctx.beginPath();
                    ctx.arc(half + Math.cos(a) * d, half + Math.sin(a) * d, Math.max(0.5, s * (0.02 + Math.random() * 0.04)), 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
            return c;
        }
        if (tip === 'flatStick') {
            // Tall flat ellipse (long axis vertical): rotated by travel
            // direction at stamp time, so it drags PERPENDICULAR to the
            // stroke — the side of a charcoal stick laying down a wide band.
            ctx.save();
            ctx.translate(half, half);
            ctx.scale(0.35, 1);
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, half);
            grad.addColorStop(0, 'rgba(0,0,0,0.95)');
            grad.addColorStop(0.85, 'rgba(0,0,0,0.85)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, half, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        } else {
            const grad = ctx.createRadialGradient(half, half, 0, half, half, half);
            if (tip === 'wetDisc' || tip === 'granDisc') {
                // Interior wash with a stronger ring near the edge — composited,
                // that ring is the classic watercolor wet rim.
                grad.addColorStop(0, 'rgba(0,0,0,0.55)');
                grad.addColorStop(0.65, 'rgba(0,0,0,0.6)');
                grad.addColorStop(0.85, 'rgba(0,0,0,0.9)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
            } else if (tip === 'toothSoft' || tip === 'toothFine') {
                // Harder, denser base for dry media — the grain carved below
                // does the texturing, not the gradient.
                grad.addColorStop(0, 'rgba(0,0,0,0.95)');
                grad.addColorStop(0.75, 'rgba(0,0,0,0.8)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
            } else { // softDisc and the base for toothCoarse
                grad.addColorStop(0, 'rgba(0,0,0,0.9)');
                grad.addColorStop(0.6, 'rgba(0,0,0,0.6)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, s, s);
        }

        // Texture passes carve paper-tooth holes out of the base disc.
        if (tip === 'granDisc') {
            ctx.globalCompositeOperation = 'destination-out';
            const dots = Math.max(12, Math.round(s * s / 60));
            for (let i = 0; i < dots; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = Math.sqrt(Math.random()) * half;
                ctx.globalAlpha = 0.25 + Math.random() * 0.35;
                ctx.beginPath();
                ctx.arc(half + Math.cos(a) * d, half + Math.sin(a) * d, Math.max(0.6, s * (0.02 + Math.random() * 0.05)), 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (tip === 'toothCoarse') {
            ctx.globalCompositeOperation = 'destination-out';
            const dots = Math.max(20, Math.round(s * s / 30));
            for (let i = 0; i < dots; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = Math.sqrt(Math.random()) * half;
                ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                ctx.beginPath();
                ctx.arc(half + Math.cos(a) * d, half + Math.sin(a) * d, Math.max(0.8, s * (0.04 + Math.random() * 0.09)), 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (tip === 'toothSoft' || tip === 'flatStick') {
            ctx.globalCompositeOperation = 'destination-out';
            const dots = Math.max(14, Math.round(s * s / 22));
            for (let i = 0; i < dots; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = Math.sqrt(Math.random()) * half;
                ctx.globalAlpha = 0.3 + Math.random() * 0.4;
                ctx.beginPath();
                ctx.arc(half + Math.cos(a) * d, half + Math.sin(a) * d, Math.max(0.6, s * (0.03 + Math.random() * 0.05)), 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (tip === 'toothFine') {
            ctx.globalCompositeOperation = 'destination-out';
            const dots = Math.max(18, Math.round(s * s / 14));
            for (let i = 0; i < dots; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = Math.sqrt(Math.random()) * half;
                ctx.globalAlpha = 0.35 + Math.random() * 0.4;
                ctx.beginPath();
                ctx.arc(half + Math.cos(a) * d, half + Math.sin(a) * d, Math.max(0.4, s * (0.015 + Math.random() * 0.03)), 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
        return c;
    }

    // Deterministic per-variant color nudge (lightness + a whisper of hue).
    // Each cached tip variant gets its own tint, so picking a random variant
    // per stamp gives pastel's natural color wobble for free.
    function jitterColor(hex, amt, variant) {
        const r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        const l = (max + min) / 2;
        const d = max - min;
        let h = 0, sat = 0;
        if (d > 0) {
            sat = d / (1 - Math.abs(2 * l - 1));
            if (max === r) h = 60 * (((g - b) / d) % 6);
            else if (max === g) h = 60 * ((b - r) / d + 2);
            else h = 60 * ((r - g) / d + 4);
            if (h < 0) h += 360;
        }
        const seeds = [[-1, 0.6], [0.7, -0.4], [-0.3, -0.9], [1, 0.8]];
        const [dl, dh] = seeds[variant % seeds.length];
        const l2 = Math.min(0.95, Math.max(0.05, l + dl * amt));
        const h2 = (h + dh * amt * 80 + 360) % 360;
        return `hsl(${h2.toFixed(1)}, ${(sat * 100).toFixed(1)}%, ${(l2 * 100).toFixed(1)}%)`;
    }

    function tipSprite(tip, color, w, colorJitter) {
        // Bucketed sprite size: sprites are drawn at the bucket size and
        // drawImage-scaled to the exact stamp width, keeping the cache small.
        const bucket = Math.max(8, Math.pow(2, Math.ceil(Math.log2(w))));
        const variant = Math.floor(Math.random() * TIP_VARIANTS);
        const key = `${tip}|${color}|${bucket}|${variant}|${colorJitter || 0}`;
        let sprite = tipCache.get(key);
        if (!sprite) {
            if (tipCache.size > 64) tipCache.clear(); // cheap cap; rebuilt lazily
            const mask = buildTipMask(tip, bucket);
            const ctx = mask.getContext('2d');
            ctx.globalCompositeOperation = 'source-in';
            ctx.fillStyle = colorJitter ? jitterColor(color, colorJitter, variant) : color;
            ctx.fillRect(0, 0, bucket, bucket);
            sprite = mask;
            tipCache.set(key, sprite);
        }
        return sprite;
    }

    // ---- The one shared stroke primitive ----
    // Walks a segment stamping every (spacing x width), carrying leftover
    // distance in state.residual so stamp cadence is seamless across the
    // segment boundaries of a polyline. state = { residual, dir } per stroke.
    function stampAlongSegment(ctx, presetId, color, from, to, fromW, toW, state) {
        const preset = BRUSH_PRESETS[presetId];
        const dx = to.x - from.x, dy = to.y - from.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 0.5 && preset.angle === 'follow') {
            const dir = Math.atan2(dy, dx);
            if (state.dir === undefined) state.dir = dir;
            else {
                let delta = dir - state.dir;
                while (delta > Math.PI) delta -= Math.PI * 2;
                while (delta < -Math.PI) delta += Math.PI * 2;
                state.dir += delta * 0.3; // smoothed so texture doesn't twitch
            }
        }
        const stampAt = (x, y, w) => {
            const sprite = tipSprite(preset.tip, color, w, preset.colorJitter);
            ctx.globalCompositeOperation = 'source-over';
            // Dry media (charcoal/pastel) stamp translucently and build up
            // over repeated passes; wet presets stamp at full strength since
            // their whole stroke gets one opacity pass at composite time.
            ctx.globalAlpha = preset.stampAlpha ?? 1;
            if (preset.angle === 'follow' && state.dir !== undefined) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(state.dir);
                ctx.drawImage(sprite, -w / 2, -w / 2, w, w);
                ctx.restore();
            } else {
                ctx.drawImage(sprite, x - w / 2, y - w / 2, w, w);
            }
            ctx.globalAlpha = 1;
        };

        if (dist < 0.02) { // the "dot on tap" stamp at stroke start
            stampAt(from.x, from.y, Math.max(1, fromW));
            state.residual = 0;
            return;
        }
        const step = Math.max(1, preset.spacing * Math.max((fromW + toW) / 2, 2));
        // Clamp: if the width (and so the step) shrank since the residual was
        // banked, an oversized residual would otherwise walk pos backwards.
        let sinceLast = Math.min(state.residual, step); // distance travelled since the last stamp, carried across segments
        let pos = 0;
        while (pos + (step - sinceLast) <= dist) {
            pos += step - sinceLast;
            sinceLast = 0;
            const t = pos / dist;
            const w = Math.max(1, fromW + (toW - fromW) * t);
            const jitter = preset.scatter * w;
            stampAt(
                from.x + dx * t + (Math.random() - 0.5) * 2 * jitter,
                from.y + dy * t + (Math.random() - 0.5) * 2 * jitter,
                w
            );
        }
        state.residual = sinceLast + (dist - pos);
    }

    // Pressure -> stamp width, per preset dynamics. Mouse/touch sit at a
    // fixed mid pressure like the other tools.
    function presetWidthFor(preset, baseSize, e) {
        const p = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : 0.5;
        const factor = (1 - preset.pressureSize) + preset.pressureSize * Math.min(1.6, p * 1.6);
        return Math.max(1, baseSize * factor);
    }

    // ---- Grouped tool menu ----
    // Shared by both engines' toolbars (they previously duplicated the same
    // inline template). Families render as non-clickable section headers;
    // headers are omitted entirely when only one family is visible (free and
    // anonymous users just see the flat Basics list they always had).
    const TOOL_FAMILY_ORDER = ['Basics', 'Ink', 'Watercolor', 'Charcoal', 'Pastel'];
    // Rebuilds the on-screen tool menu (if any) after auth state changes —
    // the draw screens can render before the async /account/me fetch lands,
    // and the subscriber families need to appear once it does. Click handling
    // is delegated on #toolMenu, so swapping innerHTML is safe.
    function refreshToolMenu() {
        const menu = document.getElementById('toolMenu');
        if (menu) menu.innerHTML = toolMenuHtml();
    }
    function toolMenuHtml() {
        const canSub = S.authToken && S.user && S.user.subscribed;
        const visible = Object.entries(TOOL_META).filter(([, meta]) => !meta.subscriberOnly || canSub);
        const families = new Map();
        for (const [tool, meta] of visible) {
            const fam = meta.family || 'Basics';
            if (!families.has(fam)) families.set(fam, []);
            families.get(fam).push([tool, meta]);
        }
        const showHeaders = families.size > 1;
        return TOOL_FAMILY_ORDER.filter(f => families.has(f)).map(fam => `
            ${showHeaders ? `<div class="px-3 pt-2 pb-0.5 text-[10px] font-bold uppercase tracking-wider text-gray-400 select-none">${fam}</div>` : ''}
            ${families.get(fam).map(([tool, meta]) => `
                <button data-tool="${tool}" class="toolMenuItem w-full text-left px-3 py-2 text-sm font-semibold hover:bg-gray-100 flex items-center gap-2 ${tool === S.tool ? 'bg-gray-100' : ''}">
                    <img src="${meta.icon}" alt="" class="w-12 h-12 object-contain">
                    <span>${meta.label}</span>
                </button>
            `).join('')}
        `).join('');
    }

    // ---------- OPEN CANVAS (shared live whiteboard) ----------
    // A separate, self-contained drawing engine rather than threading mode
    // checks through setupCanvas() above — that function is round-based and
    // tightly tuned (taper, palm rejection, airbrush rAF loop); duplicating
    // the handful of paint primitives here keeps this new mode from risking
    // any regression in the proven per-round drawing experience. Unlike
    // setupCanvas's drawSegment (which reads S.tool/S.brushColor/S.activeLayer
    // ambiently), every function below takes its tool/color/ctx explicitly —
    // the same code paints both the local player's live strokes and remote
    // players' replayed ones.
    function ocStrokeTaperedSegment(ctx, from, to, fromWidth, toWidth) {
        const dx = to.x - from.x, dy = to.y - from.y;
        const dist = Math.hypot(dx, dy);
        const maxWidth = Math.max(fromWidth, toWidth, 1);
        const step = Math.max(1, maxWidth * 0.5);
        const steps = Math.max(1, Math.ceil(dist / step));
        let px = from.x, py = from.y;
        for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            const x = from.x + dx * t;
            const y = from.y + dy * t;
            ctx.lineWidth = fromWidth + (toWidth - fromWidth) * t;
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(x, y);
            ctx.stroke();
            px = x; py = y;
        }
    }

    function ocDrawGrainySegment(ctx, color, from, to, width) {
        const dx = to.x - from.x, dy = to.y - from.y;
        const dist = Math.hypot(dx, dy) || 0.01;
        const r = Math.max(1, width) / 2;
        const step = Math.max(1, r * 0.7);
        const steps = Math.max(1, Math.ceil(dist / step));
        const fr = parseInt(color.slice(1, 3), 16);
        const fg = parseInt(color.slice(3, 5), 16);
        const fb = parseInt(color.slice(5, 7), 16);
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const cx = from.x + dx * t;
            const cy = from.y + dy * t;
            for (let s = 0; s < 3; s++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = Math.random() * r;
                const px = cx + Math.cos(angle) * rad;
                const py = cy + Math.sin(angle) * rad;
                const alpha = 0.12 + Math.random() * 0.28;
                const size = Math.max(0.4, r * (0.15 + Math.random() * 0.35));
                ctx.beginPath();
                ctx.fillStyle = `rgba(${fr}, ${fg}, ${fb}, ${alpha})`;
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    function ocDrawSegment(ctx, tool, color, from, to, fromWidth, toWidth) {
        ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
        if (tool === 'pencil') {
            ocDrawGrainySegment(ctx, color, from, to, (fromWidth + toWidth) / 2);
            return;
        }
        ctx.strokeStyle = color;
        ocStrokeTaperedSegment(ctx, from, to, fromWidth, toWidth);
    }

    // Mirrors setupCanvas's finishBrushTaper: erases the live-drawn tail and
    // redraws it narrowing to a point, so a lifted brush stroke doesn't end
    // in a blunt cap. `tail` is the last few {x,y,width} points of the stroke.
    function ocFinishBrushTaper(ctx, color, tail) {
        if (!tail || tail.length < 2) return;
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineCap = 'round';
        for (let i = 1; i < tail.length; i++) {
            ocStrokeTaperedSegment(ctx, tail[i - 1], tail[i], tail[i - 1].width + 3, tail[i].width + 3);
        }
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = color;
        const taperedWidths = tail.map((pt, i) => {
            const taper = 1 - i / (tail.length - 1);
            return Math.max(0.3, pt.width * (0.08 + taper * 0.92));
        });
        for (let i = 1; i < tail.length; i++) {
            ocStrokeTaperedSegment(ctx, tail[i - 1], tail[i], taperedWidths[i - 1], taperedWidths[i]);
        }
    }

    // One frame's worth of airbrush specks — called on every local rAF tick
    // while spraying, and once per throttled 'airbrush' network message when
    // replaying a remote player's spray (or history).
    function ocStampAirbrushFrame(ctx, color, radius, target, pressure) {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = color;
        const specksThisFrame = Math.round(20 + pressure * 70);
        const spreadRadius = radius * (1.6 - pressure * 0.7);
        const baseOpacity = 0.3 + pressure * 0.4;
        for (let i = 0; i < specksThisFrame; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.pow(Math.random(), 2.2) * spreadRadius;
            const x = target.x + Math.cos(angle) * dist;
            const y = target.y + Math.sin(angle) * dist;
            const speckRadius = Math.max(0.3, radius * (0.01 + Math.pow(Math.random(), 4) * 0.05));
            ctx.globalAlpha = baseOpacity * (0.5 + Math.random() * 0.5);
            ctx.beginPath();
            ctx.arc(x, y, speckRadius, 0, Math.PI * 2);
            ctx.fill();
        }
        if (Math.random() < 0.04) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.pow(Math.random(), 1.5) * spreadRadius * 1.2;
            const x = target.x + Math.cos(angle) * dist;
            const y = target.y + Math.sin(angle) * dist;
            ctx.globalAlpha = 0.7 + Math.random() * 0.3;
            ctx.beginPath();
            ctx.arc(x, y, radius * (0.05 + Math.random() * 0.07), 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // ---- Networking: connect, dispatch, and apply remote draw ops ----
    let ocSocket = null;
    let ocCtxs = null; // [bottomCtx, topCtx], set by setupOpenCanvasDrawing while the canvas screen is live
    let ocReconnectTimer = null;
    // Reconnect backoff — starts at 1s, doubles on each failed retry up to a
    // cap, resets to 1s on a successful open. Keeps a genuinely-down server
    // from being hammered every 2s while still reconnecting fast after a
    // brief mobile blip.
    let ocReconnectDelay = 1000;
    const OC_RECONNECT_MAX = 20000;
    // Installed while the canvas screen is live: when the tab is foregrounded
    // again (or the network returns) we reconnect immediately rather than
    // waiting out a backoff timer that a backgrounded phone likely froze.
    let ocResumeHandler = null;
    const ocRemoteStrokeState = new Map(); // player order -> { last:{x,y}, lastWidth, preset? }
    const ocCursorEls = new Map();          // player order -> cursor DOM element
    // Pooled per-player wet buffers for remote watercolor strokes (Open
    // Canvas is always BASE resolution). A remote wet stroke accumulates in
    // its player's buffer and composites onto the layer when their 'up' op
    // arrives — no live preview for remote wet strokes, they appear on lift.
    const ocWetBuffers = new Map();
    function ocWetBufferFor(order) {
        let c = ocWetBuffers.get(order);
        if (!c) {
            c = document.createElement('canvas');
            c.width = BASE_CANVAS_W; c.height = BASE_CANVAS_H;
            ocWetBuffers.set(order, c);
        }
        return c;
    }

    function ocSend(msg) {
        if (ocSocket && ocSocket.readyState === WebSocket.OPEN) {
            ocSocket.send(JSON.stringify(msg));
        }
    }

    function ocPlayerByOrder(order) {
        return (S.game && S.game.players || []).find(p => p.order === order);
    }

    function applyRemoteDrawOp(op) {
        if (!ocCtxs) return;
        const ctx = ocCtxs[op.layer === 0 ? 0 : 1];
        if (op.type === 'fill') {
            floodFill(ctx, Math.round(op.x), Math.round(op.y), op.color);
        } else if (op.type === 'airbrush') {
            ocStampAirbrushFrame(ctx, op.color, op.radius, { x: op.x, y: op.y }, op.pressure);
        } else if (op.type === 'stamp') {
            // Ink brush stamps: position/size are exact, the random blot shape
            // re-rolls per client — same accepted divergence as airbrush mist.
            if (op.tool === 'splat') {
                inkStampSplat(ctx, op.color, op.size, op.x, op.y);
            } else if (op.tool === 'splatter') {
                // `frames` compensates for the sender's network throttle so
                // remote canvases build up the same drop density as the local one.
                for (let i = 0; i < (op.frames || 1); i++) {
                    inkStampSplatterFrame(ctx, op.color, op.radius, { x: op.x, y: op.y }, op.pressure);
                }
            } else if (op.tool === 'quillblob') {
                inkStampQuillBlob(ctx, op.color, op.size, op.x, op.y);
            }
        } else if (op.type === 'stroke' && BRUSH_PRESETS[op.tool]) {
            // Stamp-engine preset strokes: widths ride the wire, stamp
            // randomness re-rolls per client (accepted airbrush-style
            // divergence). Wet presets accumulate in the player's pooled
            // buffer and composite on their 'up'.
            const preset = BRUSH_PRESETS[op.tool];
            const key = op.order;
            const targetFor = () => {
                if (!preset.wet) return ctx;
                return ocWetBufferFor(key).getContext('2d');
            };
            if (op.phase === 'down') {
                const st = { last: { x: op.x, y: op.y }, lastWidth: op.width, preset: { residual: 0, dir: undefined } };
                ocRemoteStrokeState.set(key, st);
                const target = targetFor();
                if (preset.wet) target.clearRect(0, 0, BASE_CANVAS_W, BASE_CANVAS_H);
                stampAlongSegment(target, op.tool, op.color, { x: op.x, y: op.y }, { x: op.x, y: op.y }, op.width, op.width, st.preset);
            } else if (op.phase === 'move' && op.points && op.points.length) {
                let st = ocRemoteStrokeState.get(key);
                if (!st || !st.preset) {
                    // Joined mid-stroke: start fresh state (and a fresh buffer,
                    // in case a dropped stroke left stale paint in the pool).
                    st = { last: { x: op.points[0].x, y: op.points[0].y }, lastWidth: op.points[0].width, preset: { residual: 0, dir: undefined } };
                    ocRemoteStrokeState.set(key, st);
                    if (preset.wet) targetFor().clearRect(0, 0, BASE_CANVAS_W, BASE_CANVAS_H);
                }
                const target = targetFor();
                for (const pt of op.points) {
                    stampAlongSegment(target, op.tool, op.color, st.last, { x: pt.x, y: pt.y }, st.lastWidth, pt.width, st.preset);
                    st.last = { x: pt.x, y: pt.y };
                    st.lastWidth = pt.width;
                }
            } else if (op.phase === 'up') {
                if (preset.wet) {
                    const buf = ocWetBufferFor(key);
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.globalAlpha = preset.opacity;
                    ctx.drawImage(buf, 0, 0);
                    ctx.globalAlpha = 1;
                    ctx.globalCompositeOperation = 'source-over';
                    buf.getContext('2d').clearRect(0, 0, BASE_CANVAS_W, BASE_CANVAS_H);
                }
                ocRemoteStrokeState.delete(key);
            }
        } else if (op.type === 'stroke') {
            const key = op.order;
            if (op.phase === 'down') {
                ocRemoteStrokeState.set(key, { last: { x: op.x, y: op.y }, lastWidth: op.width });
                ocDrawSegment(ctx, op.tool, op.color, { x: op.x, y: op.y }, { x: op.x + 0.01, y: op.y + 0.01 }, op.width, op.width);
            } else if (op.phase === 'move' && op.points && op.points.length) {
                let st = ocRemoteStrokeState.get(key);
                if (!st) {
                    st = { last: { x: op.points[0].x, y: op.points[0].y }, lastWidth: op.points[0].width };
                    ocRemoteStrokeState.set(key, st);
                }
                for (const pt of op.points) {
                    ocDrawSegment(ctx, op.tool, op.color, st.last, { x: pt.x, y: pt.y }, st.lastWidth, pt.width);
                    st.last = { x: pt.x, y: pt.y };
                    st.lastWidth = pt.width;
                }
            } else if (op.phase === 'up') {
                if (op.tool === 'brush' && op.tail) ocFinishBrushTaper(ctx, op.color, op.tail);
                ocRemoteStrokeState.delete(key);
            }
        }
    }

    function ocRemoveCursor(order) {
        const el = ocCursorEls.get(order);
        if (el) { el.remove(); ocCursorEls.delete(order); }
    }

    // Positions a colored crosshair over the canvas for a remote player's
    // pointer, converting canvas-pixel coordinates to the canvas's current
    // on-screen CSS size (same scale fitPaper() applies to the canvases
    // themselves, so the dot lands exactly where their pointer is).
    function ocUpdateCursor(order, x, y) {
        const layer = document.getElementById('ocCursorLayer');
        const stack = document.getElementById('canvasStack');
        if (!layer || !stack) return;
        const player = ocPlayerByOrder(order);
        if (!player) return;

        let el = ocCursorEls.get(order);
        if (!el) {
            el = document.createElement('div');
            el.style.cssText = 'position:absolute; width:22px; height:22px; margin-left:-11px; margin-top:-11px; pointer-events:none; transition:left 60ms linear, top 60ms linear;';
            el.innerHTML = `
                <svg width="22" height="22" viewBox="0 0 22 22" style="overflow:visible">
                    <line x1="11" y1="0" x2="11" y2="7" stroke="${player.cursorColor}" stroke-width="2"/>
                    <line x1="11" y1="15" x2="11" y2="22" stroke="${player.cursorColor}" stroke-width="2"/>
                    <line x1="0" y1="11" x2="7" y2="11" stroke="${player.cursorColor}" stroke-width="2"/>
                    <line x1="15" y1="11" x2="22" y2="11" stroke="${player.cursorColor}" stroke-width="2"/>
                    <circle cx="11" cy="11" r="2.5" fill="${player.cursorColor}"/>
                </svg>
                <span style="position:absolute; top:22px; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:10px; font-weight:700; color:#fff; background:${player.cursorColor}; padding:1px 5px; border-radius:8px;">${escapeHtml(player.name.slice(0, 12))}</span>`;
            layer.appendChild(el);
            ocCursorEls.set(order, el);
        }
        const scaleX = stack.clientWidth / CANVAS_W;
        const scaleY = stack.clientHeight / CANVAS_H;
        el.style.left = (x * scaleX) + 'px';
        el.style.top = (y * scaleY) + 'px';
    }

    function connectCanvasSocket() {
        disconnectCanvasSocket();
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${proto}//${location.host}/ws/canvas?code=${S.code}&playerId=${S.playerId}`);
        ocSocket = socket;

        socket.addEventListener('open', () => {
            if (ocSocket !== socket) return;
            ocReconnectDelay = 1000; // healthy connection — reset backoff
            const badge = document.getElementById('ocConnStatus');
            if (badge) { badge.textContent = '🟢 Live'; badge.className = 'text-xs px-2 py-0.5 rounded-full bg-green-50 text-green-700'; }
        });

        socket.addEventListener('message', e => {
            if (ocSocket !== socket) return;
            let msg;
            try { msg = JSON.parse(e.data); } catch (err) { return; }
            if (msg.type === 'history') {
                // Clears first — a reconnect replays the server's full log again,
                // and drawing it on top of what's already there would double
                // every stroke instead of just resyncing to the canonical state.
                if (ocCtxs) {
                    ocCtxs[0].clearRect(0, 0, CANVAS_W, CANVAS_H);
                    ocCtxs[1].clearRect(0, 0, CANVAS_W, CANVAS_H);
                }
                ocRemoteStrokeState.clear();
                (msg.strokes || []).forEach(applyRemoteDrawOp);
            } else if (msg.type === 'cursor') {
                if (msg.order !== (S.game.you && S.game.you.order)) ocUpdateCursor(msg.order, msg.x, msg.y);
            } else if (msg.type === 'presence' && !msg.connected) {
                ocRemoveCursor(msg.order);
                ocRemoteStrokeState.delete(msg.order);
            } else if (msg.type === 'finished') {
                pollState();
            } else {
                if (msg.order === (S.game.you && S.game.you.order)) return; // never re-apply our own strokes
                applyRemoteDrawOp(msg);
            }
        });

        const scheduleReconnect = () => {
            if (ocSocket !== socket) return;
            ocSocket = null;
            const badge = document.getElementById('ocConnStatus');
            if (badge) { badge.textContent = '🔴 Reconnecting…'; badge.className = 'text-xs px-2 py-0.5 rounded-full bg-red-50 text-red-600'; }
            if (S.screen === 'canvas' && S.game && S.game.status === 'active') {
                if (ocReconnectTimer) clearTimeout(ocReconnectTimer);
                ocReconnectTimer = setTimeout(connectCanvasSocket, ocReconnectDelay);
                ocReconnectDelay = Math.min(OC_RECONNECT_MAX, ocReconnectDelay * 2);
            }
        };
        socket.addEventListener('close', scheduleReconnect);
        socket.addEventListener('error', () => socket.close());

        // Reconnect the instant the tab is foregrounded or the network comes
        // back — a backgrounded phone often freezes the backoff timer and may
        // never fire a clean 'close', so without this the canvas stays frozen
        // when the user returns from checking a notification. Installed once
        // per connect; disconnectCanvasSocket removes it (and connect below
        // re-installs), so it's live exactly while we're on the canvas screen.
        if (!ocResumeHandler) {
            ocResumeHandler = () => {
                if (document.hidden) return; // only act on resume, not on hide
                if (S.screen !== 'canvas' || !S.game || S.game.status !== 'active') return;
                const s = ocSocket;
                if (!s || (s.readyState !== WebSocket.OPEN && s.readyState !== WebSocket.CONNECTING)) {
                    if (ocReconnectTimer) { clearTimeout(ocReconnectTimer); ocReconnectTimer = null; }
                    ocReconnectDelay = 1000;
                    connectCanvasSocket();
                }
            };
            document.addEventListener('visibilitychange', ocResumeHandler);
            window.addEventListener('online', ocResumeHandler);
        }
    }

    function disconnectCanvasSocket() {
        if (ocReconnectTimer) { clearTimeout(ocReconnectTimer); ocReconnectTimer = null; }
        if (ocResumeHandler) {
            document.removeEventListener('visibilitychange', ocResumeHandler);
            window.removeEventListener('online', ocResumeHandler);
            ocResumeHandler = null;
        }
        if (ocSocket) { const s = ocSocket; ocSocket = null; s.close(); }
        ocRemoteStrokeState.clear();
        ocCursorEls.forEach(el => el.remove());
        ocCursorEls.clear();
    }

    // Lightweight roster refresh for the canvas screen's player chip row —
    // called on every 2s poll tick, deliberately never touches canvas pixels
    // (those are owned entirely by the WebSocket).
    function updateCanvasPlayerList(g) {
        const list = document.getElementById('ocPlayerList');
        if (!list) return;
        list.innerHTML = g.players.map(p => `
            <span class="text-xs px-2 py-1 rounded-full text-white font-semibold" style="background:${p.cursorColor || '#999'}" title="${escapeHtml(p.name)}">${escapeHtml(p.name.slice(0, 10))}</span>
        `).join('');
    }

    // Briefly flashes the shared Open Canvas theme suggestion center-screen —
    // appended to <body> (not #app) so it survives on top of the canvas and
    // fades on its own rather than needing a dismiss click.
    let ocFlashEl = null;
    function flashOcTheme(theme) {
        if (ocFlashEl) { ocFlashEl.remove(); ocFlashEl = null; }
        const flash = document.createElement('div');
        flash.style.cssText = 'position:fixed; top:90px; left:50%; transform:translateX(-50%); z-index:100; background:#111827; color:#fff; padding:14px 28px; border-radius:9999px; font-weight:700; font-size:18px; box-shadow:0 10px 30px rgba(0,0,0,.35); opacity:0; transition:opacity 0.4s ease; pointer-events:none; white-space:nowrap;';
        flash.innerHTML = `💡 Suggested theme: <span class="capitalize" style="color:#ffec06">${escapeHtml(theme)}</span>`;
        document.body.appendChild(flash);
        ocFlashEl = flash;
        requestAnimationFrame(() => { flash.style.opacity = '1'; });
        setTimeout(() => {
            flash.style.opacity = '0';
            setTimeout(() => { flash.remove(); if (ocFlashEl === flash) ocFlashEl = null; }, 500);
        }, 4000);
    }

    function renderCanvasMode() {
        const g = S.game;
        // Open Canvas always draws at the base (free-tier) resolution for
        // every player, paid or not — it's one shared surface, so there's no
        // meaningful per-player "print quality" the way there is for a
        // personal sheet in the round-based modes.
        CANVAS_W = BASE_CANVAS_W; CANVAS_H = BASE_CANVAS_H; EDGE_H = BASE_EDGE_H; RENDER_SCALE = 1;
        const sizeCfg = sizeConfigFor(S.tool);

        app.innerHTML = `
        <div class="bg-gray-100 flex flex-col" style="height:100vh; height:100dvh; overflow:hidden">
            <div class="flex items-center justify-between px-4 py-2 bg-white shadow-sm shrink-0 flex-wrap gap-y-2">

                    <span class="font-bold text-xl text-gray-900">🖌️ Open Canvas</span>
                    <span id="ocConnStatus" class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-400">Connecting…</span>
                    <button id="ocShareBtn" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold rounded-lg">🔗 Share</button>
                </div>
                <div class="flex items-center gap-3">
                    <div id="ocPlayerList" class="hidden sm:flex items-center gap-1.5 flex-wrap"></div>
                    ${g.you && g.you.order === 1

                        : `<span class="text-xs text-gray-400 italic">Only ${escapeHtml((g.players.find(p => p.order === 1) || {}).name || 'the creator')} can finish this drawing</span>`}
                </div>

            ${g.theme ? `
                <div class="px-4 py-1.5 bg-yellow-50 border-t border-yellow-200 text-center shrink-0">

                        💡 Suggested theme for everyone: <span class="capitalize underline decoration-dotted">${escapeHtml(g.theme)}</span>
                    </button>
                </div>
            ` : ''}

            <!-- Toolbar -->
            <div class="flex items-center gap-3 px-4 py-2 bg-white border-t border-gray-100 shadow-sm shrink-0 flex-wrap">
                <div class="relative">
                    <button id="toolTrigger" class="px-3 py-1.5 rounded-lg border border-gray-300 text-sm font-semibold flex items-center gap-1.5" title="Drawing tool">
                        <img id="toolTriggerIcon" src="${TOOL_META[S.tool].icon}" alt="" class="w-12 h-12 object-contain">
                        <span id="toolTriggerLabel">${TOOL_META[S.tool].label}</span>
                        <span class="text-gray-400 text-[10px]">▾</span>
                    </button>
                    <div id="toolMenu" class="hidden absolute left-0 top-full mt-1 bg-white border border-gray-300 rounded-lg shadow-lg z-20" style="min-width:170px; max-height:60vh; overflow-y:auto">
                        ${toolMenuHtml()}
                    </div>
                </div>
                <span id="brushHint" class="text-xs text-amber-600 font-semibold ${S.tool === 'brush' ? '' : 'hidden'}">🖊️ stylus only</span>
                <div class="h-6 border-l border-gray-300"></div>
                <div class="flex items-center gap-1.5">
                    <span class="text-xs text-gray-500 mr-0.5">Layer</span>
                    <button id="layerBtn1" data-layer="1" class="layerBtn active px-2.5 py-1.5 rounded-lg border border-gray-300 text-sm font-semibold" title="Line art layer (top)">1</button>
                    <button id="layerBtn0" data-layer="0" class="layerBtn px-2.5 py-1.5 rounded-lg border border-gray-300 text-sm font-semibold" title="Background layer (bottom)">2</button>
                </div>
                <div class="h-6 border-l border-gray-300"></div>
                <div class="flex items-center gap-1.5" id="colorRow">
                    ${['#000000'].map(c => `

                    `).join('')}
                    <label class="relative w-7 h-7 rounded-full border-2 border-gray-300 overflow-hidden cursor-pointer ml-1" title="Custom color"
                        style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)">
                        <input id="customColor" type="color" value="${S.brushColor}" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">

        setupOpenCanvasDrawing();
        updateCanvasPlayerList(g);
        connectCanvasSocket();

        document.getElementById('ocShareBtn').addEventListener('click', () => showShareGameModal(g.code, {
            isCreator: g.you && g.you.order === 1,
            openToFriends: g.openToFriends,
            playerId: S.playerId,
        }));

        // Flash the shared theme suggestion once when everyone first lands on
        // the canvas — same word for every player (picked server-side at
        // /start), unlike the round modes where each player privately rolls
        // their own. The toolbar chip lets anyone re-flash it later.
        if (g.theme) {
            flashOcTheme(g.theme);
            document.getElementById('ocThemeChip').addEventListener('click', () => flashOcTheme(g.theme));
        }

        const finishBtn = document.getElementById('finishBtn');
        if (!finishBtn) return; // only the creator sees a Finish button at all
        finishBtn.addEventListener('click', async () => {
            const ok = await showConfirmModal({
                title: 'Finish this drawing for everyone?',
                message: "This ends the session for the whole group and saves what's on the canvas right now — no one will be able to draw more.",
                confirmLabel: 'Finish it',
                cancelLabel: 'Keep drawing',
                icon: '🏁',
                confirmClass: 'bg-[#ffec06] hover:bg-[#e6d405]',
                confirmTextClass: 'text-black',
            });
            if (!ok) return;
            const btn = document.getElementById('finishBtn');
            btn.disabled = true;
            btn.textContent = 'Finishing...';
            try {
                const flat = flattenLayers();
                const normalized = normalizeToOutputSize(flat);
                const image = normalized.toDataURL('image/png');
                const data = await api(`/games/${S.code}/finish`, {
                    method: 'POST',
                    body: JSON.stringify({ playerId: S.playerId, image }),
                });
                S.game = data;
                stopPolling();
                disconnectCanvasSocket();
                S.screen = 'results';
                render();
            } catch (e) {
                alert('Could not finish: ' + e.message);
                btn.disabled = false;
                btn.textContent = '🏁 Finish';

        });
