    // Pointer handling for the shared canvas: structurally similar to
    // setupCanvas() above, but every draw call also gets broadcast (and
    // remote players' draw calls get applied here too, via applyRemoteDrawOp).
    function setupOpenCanvasDrawing() {
        const canvases = [document.getElementById('layerCanvas0'), document.getElementById('layerCanvas1')];
        const ctxs = canvases.map(c => c.getContext('2d', { willReadFrequently: true }));
        ctxs.forEach(ctx => { ctx.lineCap = 'round'; ctx.lineJoin = 'round'; });
        ocCtxs = ctxs;

        const topCanvas = canvases[1];

        fitPaper();
        requestAnimationFrame(fitPaper);
        window.onresize = fitPaper;

        let activePointer = null;
        let penSeen = false;
        let last = null;
        let lastWidth = 0;

        function pos(e) {
            const rect = topCanvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (CANVAS_W / rect.width),
                y: (e.clientY - rect.top) * (CANVAS_H / rect.height),
            };
        }

        let lastBrushPressure = 0.5;
        function widthFor(e) {
            const sizeMap = { eraser: S.eraserSize, pencil: S.pencilSize, brush: S.brushSize };
            const base = sizeMap[S.tool] ?? S.penSize;
            if (S.tool === 'brush') {
                const pressure = e.pressure > 0 ? e.pressure : lastBrushPressure;
                lastBrushPressure = pressure;
                return Math.max(0.5, base * (0.3 + pressure * 1.4));
            }
            return base;
        }

        const BRUSH_TAPER_IN_POINTS = 6;
        const BRUSH_TAPER_OUT_POINTS = 8;
        let brushStroke = [];
        function brushTaperInFactor(pointIndex) {
            return Math.min(1, (pointIndex + 1) / BRUSH_TAPER_IN_POINTS);
        }

        let airbrushRaf = null;
        let airbrushTarget = null;
        let lastAirbrushPressure = 0.5;
        let airbrushFrameCount = 0;
        function airbrushPressureFor(e) {
            if (e.pointerType !== 'pen') return 0.5;
            const pressure = e.pressure > 0 ? e.pressure : lastAirbrushPressure;
            lastAirbrushPressure = pressure;
            return pressure;
        }
        function airbrushTick() {
            if (!airbrushTarget) return;
            const radius = S.airbrushSize;
            ocStampAirbrushFrame(ctxs[S.activeLayer], S.brushColor, radius, airbrushTarget, lastAirbrushPressure);
            // Broadcasting every frame would be excessive — every 3rd frame
            // (~20fps) is still a convincing spray on remote screens.
            airbrushFrameCount++;
            if (airbrushFrameCount % 3 === 0) {
                ocSend({ type: 'airbrush', x: airbrushTarget.x, y: airbrushTarget.y, pressure: lastAirbrushPressure, color: S.brushColor, layer: S.activeLayer, radius });
            }
            airbrushRaf = requestAnimationFrame(airbrushTick);
        }
        function startAirbrush(p, e) {
            airbrushTarget = p;
            lastAirbrushPressure = airbrushPressureFor(e);
            airbrushFrameCount = 0;
            airbrushRaf = requestAnimationFrame(airbrushTick);
        }
        function stopAirbrush() {
            if (airbrushRaf !== null) cancelAnimationFrame(airbrushRaf);
            airbrushRaf = null;
            airbrushTarget = null;
        }

        // ---- Ink Splatter (shared-canvas variant): stamps locally every
        // frame, broadcasts every 3rd with frames:3 so remote clients loop
        // the stamp and land at the same drop density. ----
        let splatterRaf = null;
        let splatterTarget = null;
        let lastSplatterPressure = 0.5;
        let splatterFrameCount = 0;
        function splatterPressureFor(e) {
            if (e.pointerType !== 'pen') return 0.5;
            const pressure = e.pressure > 0 ? e.pressure : lastSplatterPressure;
            lastSplatterPressure = pressure;
            return pressure;
        }
        function splatterTick() {
            if (!splatterTarget) return;
            const radius = S.splatterSize;
            inkStampSplatterFrame(ctxs[S.activeLayer], S.brushColor, radius, splatterTarget, lastSplatterPressure);
            splatterFrameCount++;
            if (splatterFrameCount % 3 === 0) {
                ocSend({ type: 'stamp', tool: 'splatter', x: splatterTarget.x, y: splatterTarget.y, pressure: lastSplatterPressure, color: S.brushColor, layer: S.activeLayer, radius, frames: 3 });
            }
            splatterRaf = requestAnimationFrame(splatterTick);
        }
        function startSplatter(p, e) {
            splatterTarget = p;
            lastSplatterPressure = splatterPressureFor(e);
            splatterFrameCount = 0;
            splatterRaf = requestAnimationFrame(splatterTick);
        }
        function stopSplatter() {
            if (splatterRaf !== null) cancelAnimationFrame(splatterRaf);
            splatterRaf = null;
            splatterTarget = null;
        }

        // ---- Ink Splat ----
        let lastSplatStamp = null;
        function splatSizeFor(e) {
            let sz = S.splatSize * (0.8 + Math.random() * 0.4);
            if (e.pointerType === 'pen' && e.pressure > 0) sz *= 0.6 + e.pressure * 0.8;
            return sz;
        }
        function stampAndSendSplat(e, p) {
            const sz = splatSizeFor(e);
            inkStampSplat(ctxs[S.activeLayer], S.brushColor, sz, p.x, p.y);
            ocSend({ type: 'stamp', tool: 'splat', x: p.x, y: p.y, size: sz, color: S.brushColor, layer: S.activeLayer });
            lastSplatStamp = p;
        }

        // ---- Wet Quill (speed-sensitive width; see the round engine's notes) ----
        let quillSmooth = null;
        let lastQuillTs = 0;
        let lastQuillSpeed = 0;
        function quillWidthFor(ev, p, prev) {
            const dt = Math.max(1, ev.timeStamp - lastQuillTs);
            lastQuillTs = ev.timeStamp;
            const dist = prev ? Math.hypot(p.x - prev.x, p.y - prev.y) : 0;
            lastQuillSpeed = dist / dt;
            const target = 0.35 + 1.3 * Math.exp(-lastQuillSpeed / 1.2);
            quillSmooth = quillSmooth === null ? target : quillSmooth + (target - quillSmooth) * 0.25;
            let w = S.quillSize * quillSmooth;
            if (ev.pointerType === 'pen' && ev.pressure > 0) w *= 0.55 + ev.pressure * 0.9;
            return Math.max(0.5, w);
        }
        function stampAndSendQuillBlob(size, x, y) {
            inkStampQuillBlob(ctxs[S.activeLayer], S.brushColor, size, x, y);
            ocSend({ type: 'stamp', tool: 'quillblob', x, y, size, color: S.brushColor, layer: S.activeLayer });
        }
        function quillInkEffects(p, w, isStart) {
            if (isStart) {
                stampAndSendQuillBlob(w * (0.9 + Math.random() * 0.6), p.x, p.y);
                return;
            }
            if (lastQuillSpeed < 0.25 && Math.random() < 0.04) {
                stampAndSendQuillBlob(w * (1.2 + Math.random() * 0.9), p.x, p.y);
            }
            if (Math.random() < 0.015) {
                const a = Math.random() * Math.PI * 2;
                const d = w * (2 + Math.random() * 5);
                stampAndSendQuillBlob(Math.max(0.6, w * (0.12 + Math.random() * 0.25)), p.x + Math.cos(a) * d, p.y + Math.sin(a) * d);
            }
        }

        // ---- Stamp-engine presets (local player; remote peers replay via
        // applyRemoteDrawOp's preset branch). Same wet-buffer scheme as the
        // round engine, at Open Canvas's fixed base resolution. ----
        let presetState = null;
        let wetActive = false;
        let wetBufferCanvas = null, wetBufferCtx = null;
        let previewCanvas = null, previewCtx = null;
        function ensureWetLayers() {
            if (!wetBufferCanvas) {
                wetBufferCanvas = document.createElement('canvas');
                wetBufferCanvas.width = CANVAS_W; wetBufferCanvas.height = CANVAS_H;
                wetBufferCtx = wetBufferCanvas.getContext('2d');
            }
            if (!previewCanvas) {
                previewCanvas = document.createElement('canvas');
                previewCanvas.width = CANVAS_W; previewCanvas.height = CANVAS_H;
                previewCanvas.className = 'layerCanvas block';
                previewCanvas.style.cssText = 'z-index:3; pointer-events:none';
                const stack = document.getElementById('canvasStack');
                const cursorLayer = document.getElementById('ocCursorLayer');
                if (cursorLayer) stack.insertBefore(previewCanvas, cursorLayer);
                else stack.appendChild(previewCanvas);
                previewCtx = previewCanvas.getContext('2d');
                fitPaper();
            }
        }
        function presetBaseSize(preset) {
            return S.presetSizes[S.tool] ?? preset.size;
        }
        function blitWetPreview(preset) {
            previewCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            previewCtx.globalAlpha = preset.opacity;
            previewCtx.drawImage(wetBufferCanvas, 0, 0);
            previewCtx.globalAlpha = 1;
        }
        function finishWetStroke(preset) {
            const lctx = ctxs[S.activeLayer];
            lctx.globalCompositeOperation = 'multiply';
            lctx.globalAlpha = preset.opacity;
            lctx.drawImage(wetBufferCanvas, 0, 0);
            lctx.globalAlpha = 1;
            lctx.globalCompositeOperation = 'source-over';
            wetBufferCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            previewCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            wetActive = false;
        }

        let lastCursorSend = 0;
        function sendCursor(p) {
            const now = performance.now();
            if (now - lastCursorSend < 50) return; // ~20/sec is plenty for a smooth-looking pointer
            lastCursorSend = now;
            ocSend({ type: 'cursor', x: p.x, y: p.y });
        }

        topCanvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            if (e.pointerType === 'pen') penSeen = true;
            else if (e.pointerType === 'touch' && penSeen) return;
            if (activePointer !== null) return;
            if (S.tool === 'brush' && e.pointerType !== 'pen') return;

            const p = pos(e);

            if (S.tool === 'fill') {
                floodFill(ctxs[S.activeLayer], Math.round(p.x), Math.round(p.y), S.brushColor);
                ocSend({ type: 'fill', x: Math.round(p.x), y: Math.round(p.y), color: S.brushColor, layer: S.activeLayer });
                return;
            }

            activePointer = e.pointerId;
            topCanvas.setPointerCapture(e.pointerId);
            last = p;

            if (S.tool === 'airbrush') {
                startAirbrush(p, e);
            } else if (S.tool === 'splatter') {
                startSplatter(p, e);
            } else if (S.tool === 'splat') {
                stampAndSendSplat(e, p);
            } else if (BRUSH_PRESETS[S.tool]) {
                const preset = BRUSH_PRESETS[S.tool];
                presetState = { residual: 0, dir: undefined };
                if (preset.wet) {
                    ensureWetLayers();
                    wetActive = true;
                    wetBufferCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                }
                const w = presetWidthFor(preset, presetBaseSize(preset), e);
                stampAlongSegment(preset.wet ? wetBufferCtx : ctxs[S.activeLayer], S.tool, S.brushColor, p, p, w, w, presetState);
                if (preset.wet) blitWetPreview(preset);
                lastWidth = w;
                ocSend({ type: 'stroke', phase: 'down', tool: S.tool, color: S.brushColor, layer: S.activeLayer, x: p.x, y: p.y, width: w });
            } else if (S.tool === 'quill') {
                quillSmooth = null;
                lastQuillTs = e.timeStamp;
                const w = quillWidthFor(e, p, null);
                quillInkEffects(p, w, true);
                ocDrawSegment(ctxs[S.activeLayer], S.tool, S.brushColor, p, { x: p.x + 0.01, y: p.y + 0.01 }, w, w);
                lastWidth = w;
                ocSend({ type: 'stroke', phase: 'down', tool: S.tool, color: S.brushColor, layer: S.activeLayer, x: p.x, y: p.y, width: w });
            } else if (S.tool === 'brush') {
                brushStroke = [];
                lastBrushPressure = e.pressure > 0 ? e.pressure : 0.5;
                const w = widthFor(e) * brushTaperInFactor(0);
                brushStroke.push({ x: p.x, y: p.y, width: w });
                ocDrawSegment(ctxs[S.activeLayer], S.tool, S.brushColor, p, { x: p.x + 0.01, y: p.y + 0.01 }, w, w);
                lastWidth = w;
                ocSend({ type: 'stroke', phase: 'down', tool: S.tool, color: S.brushColor, layer: S.activeLayer, x: p.x, y: p.y, width: w });
            } else {
                const w = widthFor(e);
                ocDrawSegment(ctxs[S.activeLayer], S.tool, S.brushColor, p, { x: p.x + 0.01, y: p.y + 0.01 }, w, w);
                lastWidth = w;
                ocSend({ type: 'stroke', phase: 'down', tool: S.tool, color: S.brushColor, layer: S.activeLayer, x: p.x, y: p.y, width: w });
            }
        });

        topCanvas.addEventListener('pointermove', e => {
            if (e.pointerId !== activePointer) {
                // Not actively drawing — still broadcast pointer position so
                // others can see where this player's cursor is hovering.
                if (activePointer === null) sendCursor(pos(e));
                return;
            }
            e.preventDefault();

            if (S.tool === 'airbrush') {
                airbrushTarget = pos(e);
                lastAirbrushPressure = airbrushPressureFor(e);
                return;
            }
            if (S.tool === 'splatter') {
                splatterTarget = pos(e);
                lastSplatterPressure = splatterPressureFor(e);
                return;
            }
            if (S.tool === 'splat') {
                // Stamp-only tool — no stroke segments to batch; each stamp is
                // its own broadcast op.
                const splatEvents = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
                for (const ev of splatEvents) {
                    const p = pos(ev);
                    if (lastSplatStamp && Math.hypot(p.x - lastSplatStamp.x, p.y - lastSplatStamp.y) >= S.splatSize * 1.5) {
                        stampAndSendSplat(ev, p);
                    }
                    last = p;
                }
                return;
            }

            const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
            const batch = [];
            for (const ev of events) {
                const p = pos(ev);
                let w;
                if (S.tool === 'brush') {
                    w = widthFor(ev) * brushTaperInFactor(brushStroke.length);
                    brushStroke.push({ x: p.x, y: p.y, width: w });
                } else if (S.tool === 'quill') {
                    w = quillWidthFor(ev, p, last);
                } else if (BRUSH_PRESETS[S.tool]) {
                    w = presetWidthFor(BRUSH_PRESETS[S.tool], presetBaseSize(BRUSH_PRESETS[S.tool]), ev);
                } else {
                    w = widthFor(ev);
                }
                if (BRUSH_PRESETS[S.tool]) {
                    stampAlongSegment(wetActive ? wetBufferCtx : ctxs[S.activeLayer], S.tool, S.brushColor, last, p, lastWidth, w, presetState);
                } else {
                    ocDrawSegment(ctxs[S.activeLayer], S.tool, S.brushColor, last, p, lastWidth, w);
                }
                if (S.tool === 'quill') quillInkEffects(p, w, false);
                lastWidth = w;
                last = p;
                batch.push({ x: p.x, y: p.y, width: w });
            }
            if (wetActive) blitWetPreview(BRUSH_PRESETS[S.tool]);
            if (batch.length) {
                ocSend({ type: 'stroke', phase: 'move', tool: S.tool, color: S.brushColor, layer: S.activeLayer, points: batch });
            }
        });

        const stop = e => {
            if (e.pointerId === activePointer) {
                if (S.tool === 'brush') {
                    const tailStart = Math.max(0, brushStroke.length - BRUSH_TAPER_OUT_POINTS);
                    const tail = brushStroke.slice(tailStart);
                    ocFinishBrushTaper(ctxs[S.activeLayer], S.brushColor, tail);
                    ocSend({ type: 'stroke', phase: 'up', tool: 'brush', color: S.brushColor, layer: S.activeLayer, tail });
                    brushStroke = [];
                }
                if (S.tool === 'airbrush') stopAirbrush();
                if (S.tool === 'splatter') stopSplatter();
                if (S.tool === 'splat') lastSplatStamp = null;
                if (S.tool === 'quill') {
                    if (last && quillSmooth !== null && quillSmooth > 1.1) {
                        stampAndSendQuillBlob(lastWidth * (1.0 + Math.random() * 0.5), last.x, last.y);
                    }
                    ocSend({ type: 'stroke', phase: 'up', tool: 'quill', color: S.brushColor, layer: S.activeLayer });
                }
                if (BRUSH_PRESETS[S.tool]) {
                    if (wetActive) finishWetStroke(BRUSH_PRESETS[S.tool]);
                    presetState = null;
                    // Remote peers composite their pooled buffer on this op
                    ocSend({ type: 'stroke', phase: 'up', tool: S.tool, color: S.brushColor, layer: S.activeLayer });
                }
                activePointer = null;
                last = null;
            }
        };
        topCanvas.addEventListener('pointerup', stop);
        topCanvas.addEventListener('pointercancel', stop);
        topCanvas.addEventListener('contextmenu', e => e.preventDefault());

        // ---- Toolbar wiring (tool picker, layers, color, size) — same UI
        // patterns as setupCanvas, minus Undo/Clear (see renderCanvasMode). ----
        const toolTrigger = document.getElementById('toolTrigger');
        const toolMenu = document.getElementById('toolMenu');
        const toolTriggerLabel = document.getElementById('toolTriggerLabel');
        const toolTriggerIcon = document.getElementById('toolTriggerIcon');

        function selectTool(tool) {
            S.tool = tool;
            toolTriggerIcon.src = TOOL_META[tool].icon;
            toolTriggerLabel.textContent = TOOL_META[tool].label;
            document.querySelectorAll('.toolMenuItem').forEach(btn => {
                btn.classList.toggle('bg-gray-100', btn.dataset.tool === tool);
            });
            topCanvas.style.cursor = tool === 'fill' ? 'cell' : 'crosshair';
            document.getElementById('brushHint').classList.toggle('hidden', tool !== 'brush');

            const cfg = sizeConfigFor(tool);
            const slider = document.getElementById('sizeSlider');
            slider.min = cfg.min;
            slider.max = cfg.max;
            slider.value = cfg.value;
            document.getElementById('sizeLabel').textContent = cfg.value;
            document.getElementById('sizeLabelText').textContent = cfg.label;

            toolMenu.classList.add('hidden');
        }
        toolTrigger.addEventListener('click', e => {
            e.stopPropagation();
            toolMenu.classList.toggle('hidden');
        });
        // Delegated (not per-item) so the menu's contents can be rebuilt in
        // place — e.g. when the async account fetch finishes after this
        // screen rendered and the subscriber brushes need to appear.
        toolMenu.addEventListener('click', e => {
            const btn = e.target.closest('.toolMenuItem');
            if (btn) selectTool(btn.dataset.tool);
        });
        document.onclick = e => {
            if (!toolMenu.contains(e.target) && e.target !== toolTrigger) toolMenu.classList.add('hidden');
        };

        document.querySelectorAll('.layerBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                S.activeLayer = Number(btn.dataset.layer);
                document.querySelectorAll('.layerBtn').forEach(b => {
                    b.classList.toggle('active', b === btn);
                });
            });
        });

        function selectColor(color) {
            S.brushColor = color;
            document.querySelectorAll('.colorBtn').forEach(b => {
                b.className = `colorBtn w-7 h-7 rounded-full border-2 ${b.dataset.color === color ? 'border-gray-900 scale-110' : 'border-gray-200'}`;
            });
            if (S.tool === 'eraser') selectTool('pen');
        }
        document.querySelectorAll('.colorBtn').forEach(btn => {
            btn.addEventListener('click', () => selectColor(btn.dataset.color));
        });
        document.getElementById('customColor').addEventListener('input', e => selectColor(e.target.value));

        document.getElementById('sizeSlider').addEventListener('input', e => {
            const val = Number(e.target.value);
            if (S.tool === 'eraser') S.eraserSize = val;
            else if (S.tool === 'pencil') S.pencilSize = val;
            else if (S.tool === 'brush') S.brushSize = val;
            else if (S.tool === 'airbrush') S.airbrushSize = val;
            else if (S.tool === 'splat') S.splatSize = val;
            else if (S.tool === 'splatter') S.splatterSize = val;
            else if (S.tool === 'quill') S.quillSize = val;
            else if (BRUSH_PRESETS[S.tool]) S.presetSizes[S.tool] = val;
            else S.penSize = val;
            document.getElementById('sizeLabel').textContent = val;
        });
        document.onkeydown = null; // no undo shortcut on this screen (no undo stack)
    }

    function setupTimer() {
        const g = S.game;
        const badge = document.getElementById('timerBadge');
        if (!badge || g.mode !== 'timed' || !g.roundStartedAt) return;

        const deadline = g.roundStartedAt + g.timePerTurn * 60 * 1000;
        function tick() {
            const remaining = Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
            const m = Math.floor(remaining / 60), s = remaining % 60;
            badge.textContent = `⏱ ${m}:${String(s).padStart(2, '0')}`;
            badge.className = `text-lg font-mono font-bold ${remaining <= 30 ? 'text-red-600' : 'text-gray-700'}`;
            if (remaining <= 0) {
                clearInterval(S.timerInterval);
                S.timerInterval = null;
                if (!S.submittedThisRound) submitDrawing();
            }
        }
        tick();
        S.timerInterval = setInterval(tick, 500);
    }

    // Flattens both layers onto an opaque white background — the server only
    // ever sees one composited image per turn, same as before layers existed.
    function flattenLayers() {
        const flat = document.createElement('canvas');
        flat.width = CANVAS_W;
        flat.height = CANVAS_H;
        const ctx = flat.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.drawImage(document.getElementById('layerCanvas0'), 0, 0);
        ctx.drawImage(document.getElementById('layerCanvas1'), 0, 0);
        return flat;
    }

    // Every submission is normalized to the universal OUTPUT_W x OUTPUT_H size,
    // regardless of the drawing resolution. Paid canvases already match (no-op);
    // free canvases get upscaled into that same frame (softer, but uniform size).
    function normalizeToOutputSize(sourceCanvas) {
        if (sourceCanvas.width === OUTPUT_W && sourceCanvas.height === OUTPUT_H) return sourceCanvas;
        const out = document.createElement('canvas');
        out.width = OUTPUT_W;
        out.height = OUTPUT_H;
        out.getContext('2d').drawImage(sourceCanvas, 0, 0, OUTPUT_W, OUTPUT_H);
        return out;
    }

    async function submitDrawing() {
        const canvas = document.getElementById('layerCanvas1');
        if (!canvas || S.submittedThisRound) return;
        S.submittedThisRound = true;
        const roundBeingSubmitted = S.game.round;

        const flat = flattenLayers();
        const normalized = normalizeToOutputSize(flat);
        const image = normalized.toDataURL('image/png');

        const strip = document.createElement('canvas');
        strip.width = OUTPUT_W;
        strip.height = OUTPUT_EDGE_H;
        strip.getContext('2d').drawImage(normalized, 0, OUTPUT_H - OUTPUT_EDGE_H, OUTPUT_W, OUTPUT_EDGE_H, 0, 0, OUTPUT_W, OUTPUT_EDGE_H);
        const edgeStrip = strip.toDataURL('image/png');

        try {
            const data = await api(`/games/${S.code}/submit`, {
                method: 'POST',
                body: JSON.stringify({ playerId: S.playerId, image, edgeStrip, inspWord: S.inspWord }),
            });
            S.game = data;

            // Track each chain the player *starts* (round 1, as creator) this
            // session, so "Pass another sheet" builds up a shareable summary
            // list instead of the share link only ever existing for a moment.
            if (data.mode === 'passthrough' && roundBeingSubmitted === 1 && data.you && data.you.order === 1
                && !S.chainSessionList.some(c => c.code === S.code)) {
                S.chainSessionList.push({ code: S.code, inspiration: S.inspWord });
            }

            if (data.status === 'completed') {
                S.screen = 'results';
                stopPolling();
            }
            render();
        } catch (e) {
            S.submittedThisRound = false;
            alert('Submit failed: ' + e.message);
        }
    }

    // ---------- RESULTS ----------
    // Round-mode favorites are stitched 3-section strips (very tall/narrow —
    // OUTPUT_W x OUTPUT_H*3). An Open Canvas favorite is a single square-ish
    // canvas (OUTPUT_W x OUTPUT_H) that would look squat next to those in the
    // account page's grid, so its favorite gets this separate narrow center
    // crop (40% of the width, full height) purely for gallery-thumbnail use —
    // the full uncropped image is still what's stored/downloaded/pinned.
    function cropNarrowThumbnail(dataUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const cropW = Math.round(img.width * 0.4);
                const cropX = Math.round((img.width - cropW) / 2);
                const c = document.createElement('canvas');
                c.width = cropW;
                c.height = img.height;
                c.getContext('2d').drawImage(img, cropX, 0, cropW, img.height, 0, 0, cropW, img.height);
                resolve(c.toDataURL('image/png'));
            };
            img.src = dataUrl;
        });
    }

    // Saved-this-session tracker for Open Canvas favorites (separate from the
    // round-based savedFavoriteKeys below since there's only ever one image
    // per game here, keyed just by game code).
    const savedOcFavoriteKeys = new Set();

    // ---------- OPEN CANVAS TIMELAPSE REPLAY ----------
    // Plays the game's persisted draw-op log back onto an offscreen pair of
    // layer canvases, compressed into a short timelapse, on the results
    // screen. Reuses applyRemoteDrawOp() wholesale — the exact same renderer
    // that paints remote players' live strokes and a late-joiner's history —
    // by pointing ocCtxs at the replay canvases and feeding it ops paced over
    // time instead of all at once. Optionally records the playback to a WebM
    // for sharing, where the browser supports canvas capture.
    let ocReplayRaf = null;
    function showOpenCanvasReplay(code) {
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
        overlay.innerHTML = `
            <div class="bg-white rounded-2xl shadow-2xl p-4 w-full max-w-md">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="font-bold text-lg text-gray-900">⏱ Replay</h3>
                    <button id="ocReplayClose" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
                </div>
                <div class="rounded-lg overflow-hidden border-2 border-gray-200 bg-white flex items-center justify-center" style="aspect-ratio:${BASE_CANVAS_W}/${BASE_CANVAS_H}; max-height:60vh">
                    <canvas id="ocReplayCanvas" class="block w-full h-full" style="object-fit:contain"></canvas>
                </div>
                <div class="mt-3 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                    <div id="ocReplayProgress" class="h-full bg-[#ffec06] transition-none" style="width:0%"></div>
                </div>
                <p id="ocReplayStatus" class="text-xs text-gray-400 mt-2 text-center">Loading replay…</p>
                <div class="grid grid-cols-2 gap-2 mt-3">
                    <button id="ocReplayAgain" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold rounded-lg" disabled>🔄 Replay</button>
                    <button id="ocReplaySave" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold rounded-lg hidden">🎬 Save video</button>
                </div>
            </div>`;
        document.body.appendChild(overlay);

        const disp = overlay.querySelector('#ocReplayCanvas');
        disp.width = BASE_CANVAS_W;
        disp.height = BASE_CANVAS_H;
        const dispCtx = disp.getContext('2d');
        const progressEl = overlay.querySelector('#ocReplayProgress');
        const statusEl = overlay.querySelector('#ocReplayStatus');
        const againBtn = overlay.querySelector('#ocReplayAgain');
        const saveBtn = overlay.querySelector('#ocReplaySave');

        // Offscreen layer pair the shared renderer draws into (bottom/top,
        // same as the live canvas), composited onto the visible canvas.
        const c0 = document.createElement('canvas'); c0.width = BASE_CANVAS_W; c0.height = BASE_CANVAS_H;
        const c1 = document.createElement('canvas'); c1.width = BASE_CANVAS_W; c1.height = BASE_CANVAS_H;
        const rctx0 = c0.getContext('2d', { willReadFrequently: true });
        const rctx1 = c1.getContext('2d', { willReadFrequently: true });
        [rctx0, rctx1].forEach(c => { c.lineCap = 'round'; c.lineJoin = 'round'; });

        let strokes = null;
        let recorder = null, recordChunks = null;

        function compositeFrame() {
            dispCtx.fillStyle = '#ffffff';
            dispCtx.fillRect(0, 0, BASE_CANVAS_W, BASE_CANVAS_H);
            dispCtx.drawImage(c0, 0, 0);
            dispCtx.drawImage(c1, 0, 0);
        }

        function cleanupReplayState() {
            if (ocReplayRaf) { cancelAnimationFrame(ocReplayRaf); ocReplayRaf = null; }
            // Hand ocCtxs back to a clean state — the live canvas re-sets it
            // when a new game starts, and the results screen never reads it.
            ocCtxs = null;
            ocRemoteStrokeState.clear();
            ocWetBuffers.clear();
        }

        function play(record) {
            if (!strokes || !strokes.length) return;
            cleanupReplayState();
            // Open Canvas is always base resolution — point the globals the
            // renderer reads (floodFill, wet buffers) at it, and aim ocCtxs
            // at our offscreen layers.
            CANVAS_W = BASE_CANVAS_W; CANVAS_H = BASE_CANVAS_H;
            rctx0.clearRect(0, 0, BASE_CANVAS_W, BASE_CANVAS_H);
            rctx1.clearRect(0, 0, BASE_CANVAS_W, BASE_CANVAS_H);
            ocCtxs = [rctx0, rctx1];
            ocRemoteStrokeState.clear();
            ocWetBuffers.clear();
            compositeFrame();

            const total = strokes.length;
            // Compress to a pleasing timelapse regardless of real drawing time:
            // ~8ms of playback per op, clamped so tiny drawings still last a
            // few seconds and epics don't drag past ~18s.
            const targetMs = Math.min(18000, Math.max(4000, total * 8));
            let applied = 0, startT = null;

            againBtn.disabled = true;
            saveBtn.disabled = true;

            if (record) {
                recordChunks = [];
                const stream = disp.captureStream(30);
                recorder = new MediaRecorder(stream, { mimeType: replayVideoMime() });
                recorder.ondataavailable = e => { if (e.data && e.data.size) recordChunks.push(e.data); };
                recorder.onstop = () => {
                    const blob = new Blob(recordChunks, { type: recorder.mimeType });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `exquisite-corpse-opencanvas-${code}-replay.webm`;
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
                    statusEl.textContent = '✓ Video saved';
                };
                recorder.start();
            }

            function frame(t) {
                if (startT === null) startT = t;
                const shouldHave = Math.min(total, Math.ceil(((t - startT) / targetMs) * total));
                while (applied < shouldHave) {
                    try { applyRemoteDrawOp(strokes[applied]); } catch (e) { /* skip a malformed op */ }
                    applied++;
                }
                compositeFrame();
                progressEl.style.width = Math.round((applied / total) * 100) + '%';
                if (applied < total) {
                    ocReplayRaf = requestAnimationFrame(frame);
                } else {
                    ocReplayRaf = null;
                    againBtn.disabled = false;
                    saveBtn.disabled = false;
                    if (!record) statusEl.textContent = 'Done';
                    if (recorder && recorder.state === 'recording') {
                        // Let the final frame land in the stream before stopping.
                        setTimeout(() => recorder.stop(), 250);
                    }
                }
            }
            statusEl.textContent = record ? 'Recording…' : 'Playing…';
            ocReplayRaf = requestAnimationFrame(frame);
        }

        function close() {
            cleanupReplayState();
            if (recorder && recorder.state === 'recording') { try { recorder.stop(); } catch (e) {} }
            overlay.remove();
        }
        overlay.querySelector('#ocReplayClose').addEventListener('click', close);
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
        againBtn.addEventListener('click', () => play(false));
        saveBtn.addEventListener('click', () => play(true));

        // Fetch the op log, then auto-play once.
        api(`/games/${code}/replay`).then(data => {
            strokes = data.strokes || [];
            if (!strokes.length) {
                statusEl.textContent = 'No replay available for this drawing.';
                return;
            }
            if (replayVideoMime()) saveBtn.classList.remove('hidden');
            play(false);
        }).catch(() => {
            statusEl.textContent = 'Could not load the replay.';
        });
    }

    // Picks a supported WebM mime for replay recording, or '' if the browser
    // can't record a canvas stream (older Safari) — the Save-video button
    // stays hidden in that case.
    function replayVideoMime() {
        if (typeof MediaRecorder === 'undefined' || !HTMLCanvasElement.prototype.captureStream) return '';
        for (const m of ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']) {
            if (MediaRecorder.isTypeSupported(m)) return m;
        }
        return '';
    }

    // Stitches a sheet's 3 sections into one tall PNG data URL (shared by download + favorites)
    // Every submitted section is already normalized to OUTPUT_W x OUTPUT_H
    // (see normalizeToOutputSize), so stitching is uniform regardless of which
    // players' sections were drawn free vs. paid.
    function stitchSheetDataUrl(sheet) {
        return new Promise((resolve) => {
            const c = document.createElement('canvas');
            c.width = OUTPUT_W;
            c.height = OUTPUT_H * 3;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, c.width, c.height);

            let loaded = 0;
            sheet.sections.forEach((sec, i) => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, i * OUTPUT_H, OUTPUT_W, OUTPUT_H);
                    loaded++;
                    if (loaded === 3) resolve(c.toDataURL('image/png'));
                };
                img.src = sec.image;
            });
        });
    }

    // Shrinks the tall 3-section strip to fit within a standard 8.5x11 page
    // (at the same 300 DPI as OUTPUT_W/H, so a single page is exactly that
    // size) and centers it, leaving white margins rather than a page-shaped
    // file with an oddly narrow, un-printable strip of content.
    function fitToLetterPage(compositeDataUrl) {
        return new Promise((resolve) => {
            const page = document.createElement('canvas');
            page.width = OUTPUT_W;
            page.height = OUTPUT_H;
            const ctx = page.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, OUTPUT_W, OUTPUT_H);

            const img = new Image();
            img.onload = () => {
                const scale = Math.min(OUTPUT_W / img.width, OUTPUT_H / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                ctx.drawImage(img, (OUTPUT_W - w) / 2, (OUTPUT_H - h) / 2, w, h);
                resolve(page.toDataURL('image/png'));
            };
            img.src = compositeDataUrl;
        });
    }

    function downloadSheet(sheet, num) {
        stitchSheetDataUrl(sheet)
            .then(dataUrl => fitToLetterPage(dataUrl))
            .then(pageDataUrl => {
                const a = document.createElement('a');
                a.href = pageDataUrl;
                a.download = `exquisite-corpse-${S.code || 'game'}-${num}.png`;
                a.click();
            });
    }

    // Square social export. The tall 3-section strip would leave blank margins
    // in a plain square frame, so we center it on a plain white square with the
    // site URL in small text at the bottom.
    function fitToSocialSquare(compositeDataUrl) {
        const SIZE = 1080, PADDING = 60, TEXT_AREA_H = 90;
        return new Promise((resolve) => {
            const page = document.createElement('canvas');
            page.width = SIZE;
            page.height = SIZE;
            const ctx = page.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, SIZE, SIZE);

            const availW = SIZE - PADDING * 2;
            const availH = SIZE - PADDING * 2 - TEXT_AREA_H;

            const img = new Image();
            img.onload = () => {
                const scale = Math.min(availW / img.width, availH / img.height);
                const w = img.width * scale, h = img.height * scale;
                const x = (SIZE - w) / 2;
                const y = PADDING + (availH - h) / 2;

                ctx.drawImage(img, x, y, w, h);

                ctx.fillStyle = '#9ca3af';
                ctx.textAlign = 'center';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText('ecdraw.art', SIZE / 2, SIZE - 54);
                ctx.font = '20px sans-serif';
                ctx.fillText('Made with Exquisite Corpse', SIZE / 2, SIZE - 24);

                resolve(page.toDataURL('image/png'));
            };
            img.src = compositeDataUrl;
        });
    }

    function downloadSheetSocial(sheet, num) {
        stitchSheetDataUrl(sheet)
            .then(dataUrl => fitToSocialSquare(dataUrl))
            .then(pageDataUrl => {
                const a = document.createElement('a');
                a.href = pageDataUrl;
                a.download = `exquisite-corpse-${S.code || 'game'}-${num}-social.png`;
                a.click();
            });
    }

    // Combines up to 3 already-stitched composite images side-by-side, then
    // fits the result onto the same 8.5x11 page used for single downloads —
    // 3 side-by-side panels happen to closely match the page's own aspect
    // ratio, so this fits almost edge-to-edge. Shared by both the results
    // screen (sheets need stitching first) and favorites (already stitched).
    //
    // Panel width is capped well below full OUTPUT_W (2550px) resolution —
    // at 3 panels that would make a canvas ~75.7 million pixels, past iOS
    // Safari's canvas allocation ceiling (roughly 4096x4096 / ~16.7M px on
    // many devices), which fails silently: no error, no download, nothing.
    // Since this result always gets downscaled again by fitToLetterPage/
    // fitToSocialSquare afterward anyway, going in at full resolution here
    // was pure waste — this cap is still sharper than the final page needs.
    const COMBINE_PANEL_W = 900;
    function combineCompositesRaw(compositeDataUrls) {
        return new Promise((resolve) => {
            const panelH = Math.round(COMBINE_PANEL_W * (OUTPUT_H * 3) / OUTPUT_W);
            const combined = document.createElement('canvas');
            combined.width = COMBINE_PANEL_W * compositeDataUrls.length;
            combined.height = panelH;
            const ctx = combined.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, combined.width, combined.height);

            let loaded = 0;
            compositeDataUrls.forEach((dataUrl, i) => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, i * COMBINE_PANEL_W, 0, COMBINE_PANEL_W, panelH);
                    loaded++;
                    if (loaded === compositeDataUrls.length) resolve(combined.toDataURL('image/png'));
                };
                img.src = dataUrl;
            });
        });
    }

    function combineSheetsRaw(sheetsToCombine) {
        return Promise.all(sheetsToCombine.map(s => stitchSheetDataUrl(s))).then(composites => combineCompositesRaw(composites));
    }

    function downloadMultipleSheets(sheetsToCombine) {
        combineSheetsRaw(sheetsToCombine)
            .then(rawDataUrl => fitToLetterPage(rawDataUrl))
            .then(pageDataUrl => {
                const a = document.createElement('a');
                a.href = pageDataUrl;
                a.download = `exquisite-corpse-${S.code || 'game'}-combined.png`;
                a.click();
            });
    }

    // Two creatures side-by-side fill the square's width far better than one tall
    // strip alone (which left a lot of blank space either side) — reuses the same
    // side-by-side combine step as the print export, just fit to a square instead.
    function downloadMultipleSheetsSocial(sheetsToCombine) {
        combineSheetsRaw(sheetsToCombine)
            .then(rawDataUrl => fitToSocialSquare(rawDataUrl))
            .then(pageDataUrl => {
                const a = document.createElement('a');
                a.href = pageDataUrl;
                a.download = `exquisite-corpse-${S.code || 'game'}-combined-social.png`;
                a.click();
            });
    }

    // Same combine flow, but for pre-stitched favorite images (no re-stitch needed)
    function downloadMultipleComposites(compositeDataUrls, filename) {
        combineCompositesRaw(compositeDataUrls)
            .then(rawDataUrl => fitToLetterPage(rawDataUrl))
            .then(pageDataUrl => {
                const a = document.createElement('a');
                a.href = pageDataUrl;
                a.download = filename;
                a.click();
            });
    }

    // Saved-this-session tracker (avoids double-saving the same sheet on re-render)
    const savedFavoriteKeys = new Set();

    async function saveSheetToFavorites(sheet, si, gameCode, btn) {
        const key = `${gameCode}-${si}`;
        if (savedFavoriteKeys.has(key)) return;

        btn.disabled = true;
        btn.textContent = 'Saving...';
        try {
            const dataUrl = await stitchSheetDataUrl(sheet);
            const artists = sheet.sections.map(sec => sec.artist || '?');
            const inspirations = sheet.sections.map(sec => sec.inspiration || null);
            const { user } = await authApi('/account/favorites', {
                method: 'POST',
                body: JSON.stringify({ image: dataUrl, gameCode, artists, inspirations }),
            });
            S.user = user;
            savedFavoriteKeys.add(key);
            btn.textContent = '★ Saved to Favorites';
            btn.className = btn.className.replace('bg-yellow-100 hover:bg-yellow-200 text-yellow-800', 'bg-yellow-400 text-yellow-900');
        } catch (e) {
            btn.disabled = false;
            if (e.message.includes('favorites (max limit)')) {
                btn.textContent = `☆ Favorites full (${MAX_FAVORITES}/${MAX_FAVORITES})`;
            } else {
                btn.textContent = '☆ Save to Favorites';
                alert('Could not save favorite: ' + e.message);
            }
        }
    }

    // ---------- SUBSCRIBE PENDING (after Stripe redirect) ----------
    // Unlike the old post-checkout flow, the account already exists and is
    // already logged in here — this just waits for the webhook to flip
    // S.user.subscribed, polling the regular account endpoint rather than
    // looking up a not-yet-created user by checkout session ID.
    function renderCheckoutPending() {
        app.innerHTML = `
        <div class="min-h-screen app-bg p-4 flex items-center justify-center">
            <div class="w-full max-w-md">
                <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
                    <div class="text-5xl mb-4 animate-bounce">🎉</div>
                    <h2 class="text-2xl font-bold mb-2">Payment received!</h2>
                    <p class="text-gray-600 mb-6" id="checkoutStatusMsg">Activating your subscription...</p>
                    <div id="checkoutManualLogin" class="hidden">
                        <button id="checkoutLoginBtn" class="w-full px-4 py-3 bg-[#ffec06] hover:bg-[#e6d405] text-black font-bold rounded-xl">Go to my account</button>
                    </div>
                </div>
            </div>
        </div>`;

        if (!S.authToken) { history.replaceState(null, '', '/'); S.screen = 'home'; render(); return; }

        let attempts = 0;
        const maxAttempts = 10; // ~15s of polling — the webhook usually lands within a couple seconds

        async function poll() {
            attempts++;
            try {
                const user = await refreshMe();
                if (user && user.subscribed) {
                    history.replaceState(null, '', '/');
                    S.screen = 'account';
                    render();
                    return;
                }
            } catch (e) {
                // keep trying — webhook may not have landed yet
            }

            if (attempts >= maxAttempts) {
                document.getElementById('checkoutStatusMsg').textContent =
                    "Almost there — this is taking longer than expected. It'll show up on your account once it's ready.";
                document.getElementById('checkoutManualLogin').classList.remove('hidden');
                document.getElementById('checkoutLoginBtn').addEventListener('click', () => {
                    history.replaceState(null, '', '/');
                    S.screen = 'account';
                    render();
                });
                return;
            }

            setTimeout(poll, 1500);
        }
        poll();
    }

    // ---------- ACCOUNT ----------
    function renderAccount() {
        if (!S.authToken) { S.screen = 'home'; render(); return; }

        // On a fresh page load, S.user may not be populated yet even though authToken persisted
        if (!S.user) {
            app.innerHTML = `<div class="min-h-screen flex items-center justify-center text-gray-400">Loading account...</div>`;
            refreshMe().then(user => {
                if (!user) S.screen = 'home';
                render();
            });
            return;
        }

        if (!S.friendsData) {
            Promise.all([authApi('/friends'), authApi('/friends/requests'), authApi('/friends/invites')])
                .then(([friendsRes, reqRes, invRes]) => {
                    S.friendsData = { friends: friendsRes.friends, incoming: reqRes.incoming, outgoing: reqRes.outgoing, invites: invRes.invites };
                    render();
                })
                .catch(() => {
                    S.friendsData = { friends: [], incoming: [], outgoing: [], invites: [] };
                    render();
                });
        }

        if (!S.myOpenGames) {
            authApi('/games/mine')
                .then(({ games }) => { S.myOpenGames = games; render(); })
                .catch(() => { S.myOpenGames = []; render(); });
        }

        const u = S.user;
        const fd = S.friendsData || { friends: [], incoming: [], outgoing: [], invites: [] };
        const visibleFriends = S.friendsShowAll ? fd.friends : fd.friends.slice(0, 3);
        // Pinned favorites read as photos tacked to the background margins.
        // Tablet+ (md, 768px) has enough width to show both side-by-side;
        // below that (phones), there's no meaningful margin for a second
        // image to live in, so just the first pin washes the whole page as
        // a faint backdrop instead of trying to show two.
        // Oldest pin (pinned first) shows left, the other shows right.
        const pinnedFavs = (u.favorites || []).filter(f => f.pinnedAt).sort((a, b) => a.pinnedAt - b.pinnedAt);
        // Full-bleed background texture, not a framed photo — free to overflow
        // off the side of the viewport, anchored near the top like it's tacked
        // to the wall there rather than floating centered.
        const pinnedWallpaper = (fav, side) => fav ? `
            <div class="hidden md:block fixed ${side}-0 top-10 w-[30vw] ${side === 'left' ? '-translate-x-[8%]' : 'translate-x-[8%]'} z-0 pointer-events-none">
                <div class="text-4xl text-center drop-shadow">📌</div>
                <img src="${fav.image}" class="w-full drop-shadow-2xl">
            </div>

                    badge.textContent = idx + 1;
                } else {
                    area.classList.remove('ring-4', 'ring-[#ffec06]');
                    badge.classList.add('hidden');
                    badge.classList.remove('flex');
                }
            });
            const countEl = document.getElementById('favSelectedCount');
            const combineBtn = document.getElementById('downloadMultipleFavBtn');
            if (countEl) countEl.textContent = selectedFavIds.length;
            if (combineBtn) {
                const enabled = selectedFavIds.length >= 2;
                combineBtn.disabled = !enabled;
                combineBtn.className = `w-full px-4 py-2.5 font-semibold text-sm rounded-xl border ${enabled ? 'bg-[#ffec06] hover:bg-[#e6d405] text-black border-[#ffec06] cursor-pointer' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`;
            }
        }
        document.querySelectorAll('.favSelectArea').forEach(area => {
            area.addEventListener('click', () => {
                const favId = area.dataset.favId;
                const idx = selectedFavIds.indexOf(favId);
                if (idx !== -1) {
                    selectedFavIds.splice(idx, 1);
                } else if (selectedFavIds.length < 3) {
                    selectedFavIds.push(favId);
                } else {
                    return;
                }
                updateFavSelectionUI();
            });
        });
        const downloadMultipleFavBtn = document.getElementById('downloadMultipleFavBtn');
        if (downloadMultipleFavBtn) {
            downloadMultipleFavBtn.addEventListener('click', () => {
                if (selectedFavIds.length < 2) return;
                const images = selectedFavIds.map(id => u.favorites.find(f => f.id === id).image);
                downloadMultipleComposites(images, `exquisite-corpse-favorites-combined.png`);
            });
        }

        wireCommentThreads(u.id, renderAccount, (key, comments) => {
            if (key === 'profile') u.profileComments = comments;
            else {
                const fav = u.favorites.find(f => f.id === key.slice(4));
                if (fav) fav.comments = comments;
            }
        });

        const addFriendBtn = document.getElementById('addFriendBtn');
        if (addFriendBtn) {
            addFriendBtn.addEventListener('click', async () => {
                const input = document.getElementById('addFriendInput');
                const username = input.value.trim();
                const msg = document.getElementById('addFriendMsg');
                if (!username) return;
                try {
                    await authApi('/friends/requests', { method: 'POST', body: JSON.stringify({ toUsername: username }) });
                    S.friendsData = null; // force refetch so the new pending/accepted state shows
                    renderAccount();
                } catch (e) {
                    msg.textContent = e.message;
                    msg.className = 'text-xs mb-3 text-red-600';
                }
            });
        }

        document.querySelectorAll('.acceptReqBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                try {
                    await authApi(`/friends/requests/${btn.dataset.userId}/accept`, { method: 'POST' });
                    S.friendsData = null;
                    renderAccount();
                } catch (e) {
                    alert('Could not accept request: ' + e.message);
                }
            });
        });

        document.querySelectorAll('.declineReqBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                try {
                    await authApi(`/friends/requests/${btn.dataset.userId}/decline`, { method: 'POST' });
                    S.friendsData = null;
                    renderAccount();
                } catch (e) {
                    alert('Could not decline request: ' + e.message);
                }
            });
        });

        document.querySelectorAll('.openGameBtn').forEach(btn => {
            btn.addEventListener('click', () => enterMyGame(S.myOpenGames[Number(btn.dataset.idx)]));
        });

        // Lets a premium account managing several chains prune ones nobody's
        // responded to, without having to open each one just to cancel it.
        document.querySelectorAll('.cancelOpenGameBtn').forEach(btn => {
            btn.addEventListener('click', async e => {
                e.stopPropagation();
                const entry = S.myOpenGames[Number(btn.dataset.idx)];
                const ok = await showConfirmModal({
                    title: 'Cancel this chain?',
                    message: 'The invite link will stop working.',
                    confirmLabel: 'Cancel chain',
                    cancelLabel: 'Keep it',
                });
                if (!ok) return;
                try {
                    await api(`/games/${entry.code}/cancel`, { method: 'POST', body: JSON.stringify({ playerId: entry.playerId }) });
                    S.myOpenGames = null;
                    renderAccount();
                } catch (e) {
                    alert('Could not cancel: ' + e.message);
                }
            });
        });

        document.querySelectorAll('.acceptInviteBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                try {
                    const data = await authApi(`/friends/invites/${btn.dataset.inviteId}/accept`, { method: 'POST' });
                    S.code = data.code;
                    S.playerId = data.playerId;
                    S.game = data;
                    sessionStorage.setItem('ec_code', S.code);
                    sessionStorage.setItem('ec_playerId', S.playerId);
                    routeToGameScreen(data);
                    render();
                    startPolling();
                } catch (e) {
                    if (isJoinFullOrStarted(e)) {
                        await showJoinFailedModal();
                    } else {
                        alert('Could not join game: ' + e.message);
                    }
                    S.friendsData = null;
                    renderAccount();
                }
            });
        });

        document.querySelectorAll('.declineInviteBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                try {
                    await authApi(`/friends/invites/${btn.dataset.inviteId}/decline`, { method: 'POST' });
                    S.friendsData = null;
                    renderAccount();
                } catch (e) {
                    alert('Could not decline invite: ' + e.message);
                }
            });
        });

        const toggleFriendsBtn = document.getElementById('toggleFriendsBtn');
        if (toggleFriendsBtn) {
            toggleFriendsBtn.addEventListener('click', () => {
                S.friendsShowAll = !S.friendsShowAll;
                renderAccount();
            });
        }

        document.querySelectorAll('.friendTile').forEach(tile => {
            tile.addEventListener('click', () => {
                S.friendProfileUserId = tile.dataset.userId;
                S.friendProfileData = null;
                S.expandedCommentKey = null;
                S.screen = 'friendProfile';
                render();
            });
        });
        } // end S.accountTab === 'profile'
    }

    // ---------- FRIEND PROFILE ----------
    function renderFriendProfile() {
        if (!S.authToken) { S.screen = 'home'; render(); return; }

        if (!S.friendProfileData) {
            app.innerHTML = `<div class="min-h-screen flex items-center justify-center text-gray-400">Loading profile...</div>`;
            authApi(`/friends/${S.friendProfileUserId}/profile`)
                .then(profile => { S.friendProfileData = profile; render(); })
                .catch(e => {
                    alert('Could not load profile: ' + e.message);
                    S.screen = 'account';
                    render();
                });
            return;
        }

        const p = S.friendProfileData;
        app.innerHTML = `
        <div class="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 p-4 py-10">
            <div class="max-w-lg mx-auto">
                <button id="backAccountBtn" class="text-sm text-gray-400 hover:text-gray-600 mb-4">&larr; Back to your account</button>
                <div class="bg-white rounded-2xl shadow-lg p-8">
                    <div class="flex items-center gap-4 mb-2">
                        <div class="w-16 h-16 rounded-full bg-purple-100 flex items-center justify-center text-2xl font-bold text-purple-600 overflow-hidden">
                            ${p.avatarDataUrl ? `<img src="${p.avatarDataUrl}" class="w-full h-full object-cover">` : escapeHtml(p.username.slice(0, 1).toUpperCase())}
                        </div>
                        <h1 class="text-xl font-bold text-gray-900 flex-1">${escapeHtml(p.username)}</h1>
                    </div>
                    <button id="inviteToGameBtn" class="w-full mb-6 px-4 py-2.5 bg-[#ffec06] hover:bg-[#e6d405] text-black font-semibold text-sm rounded-xl">
                        🎮 Start a game with ${escapeHtml(p.username)}
                    </button>

                    <div class="mb-6">
                        <h3 class="text-sm font-semibold text-gray-700 mb-2">💬 Comments</h3>
                        ${renderCommentThread(p.profileComments || [], 'profile', p.id)}
                    </div>

                    <div class="mb-6">
                        <h3 class="text-sm font-semibold text-gray-700 mb-2">⭐ Favorites (${p.favorites.length})</h3>
                        <div class="grid grid-cols-3 gap-3">
                            ${p.favorites.length > 0 ? p.favorites.map(fav => `
                                <div class="relative">
                                    <div class="rounded-lg overflow-hidden border-2 border-gray-200">
                                        <img src="${fav.thumbnail || fav.image}" class="w-full">
                                    </div>
                                    ${renderCommentThread(fav.comments || [], `fav:${fav.id}`, p.id)}
                                </div>
                            `).join('') : `<p class="col-span-3 text-sm text-gray-400 italic">No favorites saved yet.</p>`}
                        </div>
                    </div>
                </div>
            </div>
        </div>`;

        document.getElementById('backAccountBtn').addEventListener('click', () => {
            S.screen = 'account';
            render();
        });

        document.getElementById('inviteToGameBtn').addEventListener('click', async (e) => {
            const btn = e.currentTarget;
            btn.disabled = true;
            btn.textContent = 'Starting game...';
            try {
                const code = await createGame('async', null, 2);
                await joinGame(code, S.user.username);
                await authApi(`/games/${code}/invite`, {
                    method: 'POST',
                    body: JSON.stringify({ playerId: S.playerId, friendUserId: p.id }),
                });
                S.screen = 'lobby';
                render();
                startPolling();
            } catch (err) {
                alert('Could not start game: ' + err.message);
                btn.disabled = false;
                btn.textContent = `🎮 Start a game with ${p.username}`;
            }
        });

        wireCommentThreads(p.id, renderFriendProfile, (key, comments) => {
            if (key === 'profile') p.profileComments = comments;
            else {
                const fav = p.favorites.find(f => f.id === key.slice(4));
                if (fav) fav.comments = comments;
            }
        });
    }

    // ================= BACKGROUND PHOTO =================
    // Screens using the .app-bg class (see <style>) show a random photo from
    // /photos instead of a flat gradient, picked once per page load so it stays
    // consistent as the user navigates. Falls back to the plain gradient color
    // if /photos is empty or the fetch fails — never blocks the rest of boot.
    const PHOTO_BG_SCREENS = new Set(['home', 'signup', 'login', 'about', 'checkoutPending', 'myGames', 'results']);

    function updatePhotoCredit() {
        const el = document.getElementById('photoCredit');
        if (!el) return;
        el.style.display = (S.bgCredit && PHOTO_BG_SCREENS.has(S.screen)) ? 'block' : 'none';
    }

    async function loadBackgroundPhoto() {
        try {
            const { photos } = await api('/photos');
            if (!photos || !photos.length) return;
            const pick = photos[Math.floor(Math.random() * photos.length)];
            document.documentElement.style.setProperty('--app-bg-image', `url('/photos/${encodeURIComponent(pick.file)}')`);
            S.bgCredit = pick.credit;
            document.getElementById('photoCredit').textContent = `Photo: ${pick.credit}`;
            updatePhotoCredit();
        } catch (e) { /* non-critical — leave the plain gradient color */ }
    }

    // ================= BOOT =================
    (async function boot() {
        loadBackgroundPhoto();
        // Returning from a Stripe subscribe checkout takes priority over game-session restore
        if (new URLSearchParams(location.search).get('subscribe') === 'success') {
            S.screen = 'checkoutPending';
            render();
            return;
        }

        // Pre-fetch account state in the background so the home screen's auth
        // badge is correct immediately, even after a hard page reload
        if (S.authToken) {
            refreshMe().then(() => {
                if (S.screen === 'home') render();
                else refreshToolMenu(); // draw screens may have rendered before the fetch landed
            });
            startFriendsPolling();
        }

        if (S.code && S.playerId) {
            try {
                const data = await api(`/games/${S.code}?playerId=${S.playerId}`);
                S.game = data;
                routeToGameScreen(data);
                render();
                if (data.status !== 'completed') startPolling();
                return;
            } catch (e) {
                clearSession();
            }
        }
        render();
    })();
    </script>
</body>
</html>
