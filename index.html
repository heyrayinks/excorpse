<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exquisite Corpse</title>
    <link rel="icon" type="image/svg+xml" href="/graphics/Exquisite-corpse-logo.svg">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="591baadc-b89d-4b48-a42c-139931249d29"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        /* Mobile Safari's 100vh doesn't match the actually-visible viewport (it's sized
           for the browser chrome collapsed), which left a gap of plain white page
           background below every min-h-screen screen. 100dvh tracks the real visible
           area; !important because Tailwind's CDN build injects its own .min-h-screen
           rule after this stylesheet, and would otherwise win on source order. */
        .min-h-screen {
            min-height: 100vh !important;
            min-height: 100dvh !important;
        }
        .layerCanvas {
            touch-action: none;               /* stops scroll/pinch while drawing */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;      /* no iOS long-press callout */
            position: absolute;
            top: 0;
            left: 0;
        }
        /* Only the paper itself (canvas + edge-hint strip) blocks native touch
           gestures — #paperArea is the full flex area around it, including
           margin the paper doesn't fill, and that margin should stay pinch-
           zoomable so a user can zoom in/adjust without fighting the page. */
        #paperArea {
            overscroll-behavior: contain;
        }
        /* Without this, a finger touching the edge-hint strip (reaching for the
           connecting line) falls through to native scroll/pull-to-refresh
           instead of being treated as part of the paper. */
        #paperWrap {
            touch-action: none;
        }
        /* Plain <img> elements get iOS's native long-press "Save Image" callout
           regardless of touch-action — that's a separate gesture recognizer.
           The edge-hint strip is a static reference, never meant to be touched. */
        #edgeHintImg {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        .fade-in { animation: fadeIn 0.8s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
        .layerBtn.active { background: #1f2937; color: white; }
        /* Auth-style screens (home, signup, login, etc.) get a random photo from
           /photos as their backdrop instead of a flat gradient — set once at boot
           via the --app-bg-image custom property so every screen's template just
           needs the .app-bg class, no per-template wiring. The dark gradient layer
           keeps white cards readable regardless of which photo is showing; it
           renders alone (over the white fallback color) until JS sets the variable. */
        :root { --app-bg-image: none; }
        .app-bg {
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            background-image: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)), var(--app-bg-image);
        }
        #photoCredit {
            position: fixed;
            right: 10px;
            bottom: 8px;
            font-size: 11px;
            color: rgba(255,255,255,.75);
            text-shadow: 0 1px 2px rgba(0,0,0,.6);
            z-index: 50;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="photoCredit"></div>

    <script>
    // ================= STATE =================
    const S = {
        screen: 'home',        // home | lobby | draw | results | signup | login | account | checkoutPending | forgotPassword
        code: sessionStorage.getItem('ec_code') || null,
        playerId: sessionStorage.getItem('ec_playerId') || null,
        game: null,
        pollTimer: null,
        myGamesList: null,   // in-progress 'passthrough' games waiting on this player's turn, for the "continue a drawing" picker
        chainSessionList: [], // { code, inspiration } for each 'passthrough' chain started this browser session, for the share-link summary
        myOpenGames: null,   // every in-progress 'passthrough' game this account is a player in, for the account page's "Open games" section
        bgCredit: null,      // photographer credit for the randomly-picked .app-bg photo, once loaded
        emoji: localStorage.getItem('ec_emoji') || null, // player's chosen lobby icon, anon or logged in — remembered across sessions
        // drawing state
        tool: 'pen',           // pen | pencil | brush | airbrush | eraser | fill — pencil/brush/airbrush are paid-only
        brushColor: '#000000',
        penSize: 5,
        eraserSize: 15,
        pencilSize: 6,
        brushSize: 12,
        airbrushSize: 30,
        splatSize: 22,
        splatterSize: 35,
        quillSize: 7,
        presetSizes: {},       // per-preset size overrides for the stamp-engine brushes (defaults live in BRUSH_PRESETS)
        activeLayer: 1,        // 1 = line art (top, default), 0 = background/fill (bottom)
        undoStacks: [[], []],  // per-layer dataURL snapshots (compressed, memory-friendly)
        submittedThisRound: false,
        lastRound: null,
        inspWord: null,        // this round's inspiration word
        inspRound: null,       // round the modal was auto-shown for
        timerInterval: null,
        error: null,
        // account state
        authToken: localStorage.getItem('ec_authToken') || null,
        user: null,            // { id, email, username, avatarDataUrl, paid, favorites, favoritesCount }
        authError: null,
        forgotQuestion: null,   // security question fetched during the forgot-password flow, once the email's been entered
        forgotEmail: null,      // the email that question belongs to, carried into the answer+new-password submit
        returnToResults: false, // true if signup/login was triggered from the results screen
        notifyEnabled: localStorage.getItem('ec_notifyEnabled') === 'true',
        // friends state
        friendsData: null,      // cached { friends, incoming, outgoing } for the account page
        friendsShowAll: false,
        accountTab: 'profile', // 'profile' | 'settings' — which tab is showing on the account page
        expandedCommentKey: null, // which favorite/profile comment thread is expanded, e.g. "fav:<id>" or "profile"
        friendProfileUserId: null,
        friendProfileData: null,
    };

    const app = document.getElementById('app');
    const SECTION_LABELS = { head: 'Head', torso: 'Torso', legs: 'Legs' };
    // Every tool here is free. Future brushes that should be gated behind
    // the monthly subscription carry `subscriberOnly: true` (filtered out of
    // the tool menu unless S.user.subscribed) — see the two TOOL_META
    // filters below. Pencil/Brush/Airbrush used to be paid-only; they're
    // part of the permanent free set now.
    const TOOL_META = {
        pen: { icon: '/graphics/Exquisite-corpse-tool-icons-04-PEN.svg', label: 'Pen' },
        pencil: { icon: '/graphics/Exquisite-corpse-tool-icons-02-PENCIL.svg', label: 'Pencil' },
        brush: { icon: '/graphics/Exquisite-corpse-tool-icons-03-BRUSH.svg', label: 'Brush' },
        airbrush: { icon: '/graphics/Exquisite-corpse-tool-icons-07-AIRBRUSH.svg', label: 'Airbrush' },
        splat: { icon: '/graphics/Exquisite-corpse-tool-icons-08-SPLAT.svg', label: 'Ink Splat', subscriberOnly: true, family: 'Ink' },
        splatter: { icon: '/graphics/Exquisite-corpse-tool-icons-09-SPLATTER.svg', label: 'Ink Splatter', subscriberOnly: true, family: 'Ink' },
        quill: { icon: '/graphics/Exquisite-corpse-tool-icons-10-QUILL.svg', label: 'Wet Quill', subscriberOnly: true, family: 'Ink' },
        eraser: { icon: '/graphics/Exquisite-corpse-tool-icons-05-ERASER.svg', label: 'Eraser' },
        fill: { icon: '/graphics/Exquisite-corpse-tool-icons-06-FILL.svg', label: 'Fill' },
    };

    // Every tool keeps its own independent size — eraser/brush default bigger
    // and have wider max ranges, since both usually want a chunkier tip.
    function sizeConfigFor(tool) {
        if (tool === 'eraser') return { min: 1, max: 60, value: S.eraserSize, label: 'Eraser size' };
        if (tool === 'pencil') return { min: 1, max: 30, value: S.pencilSize, label: 'Pencil size' };
        if (tool === 'brush') return { min: 1, max: 50, value: S.brushSize, label: 'Brush size' };
        if (tool === 'airbrush') return { min: 5, max: 80, value: S.airbrushSize, label: 'Spray radius' };
        if (tool === 'splat') return { min: 6, max: 70, value: S.splatSize, label: 'Splat size' };
        if (tool === 'splatter') return { min: 10, max: 90, value: S.splatterSize, label: 'Flick radius' };
        if (tool === 'quill') return { min: 1, max: 30, value: S.quillSize, label: 'Quill size' };
        const preset = typeof BRUSH_PRESETS !== 'undefined' && BRUSH_PRESETS[tool];
        if (preset) return { min: preset.sizeRange[0], max: preset.sizeRange[1], value: S.presetSizes[tool] ?? preset.size, label: 'Brush size' };
        return { min: 1, max: 40, value: S.penSize, label: 'Pen size' };
    }
    const SECTION_TIPS = {
        head: 'Draw a head. Bring the neck lines down to the bottom edge so the next artist can connect.',
        torso: 'Draw a torso. Start from the lines at the top edge and bring your lines down to the bottom edge.',
        legs: 'Draw the legs. Start from the lines at the top edge. Finish strong!',
    };

    // Inspiration words — drawable nouns & evocative adjectives
    const INSPIRATION_WORDS = [
        // nouns
        'robot', 'pirate', 'wizard', 'octopus', 'dragon', 'cactus', 'astronaut', 'vampire',
        'jellyfish', 'viking', 'mermaid', 'dinosaur', 'clown', 'ninja', 'snail', 'owl',
        'walrus', 'gnome', 'yeti', 'cyborg', 'samurai', 'scarecrow', 'ghost', 'alien',
        'moose', 'flamingo', 'chicken', 'toad', 'spider', 'king', 'queen', 'jester',
        'detective', 'chef', 'cowboy', 'zombie', 'angel', 'fairy', 'troll', 'goblin',
        'knight', 'pharaoh', 'banana', 'mushroom', 'tornado', 'volcano', 'lighthouse',
        'skeleton', 'werewolf', 'librarian', 'plumber', 'ballerina', 'lumberjack',
        'sea monster', 'gargoyle', 'centaur', 'genie', 'peacock', 'porcupine', 'anglerfish',
        // adjectives
        'grumpy', 'fluffy', 'ancient', 'sleepy', 'electric', 'melting', 'giant', 'tiny',
        'furious', 'elegant', 'sneaky', 'majestic', 'wobbly', 'spiky', 'slimy', 'glamorous',
        'rusty', 'glowing', 'hairy', 'toothy', 'winged', 'armored', 'striped', 'polka-dotted',
        'royal', 'spooky', 'cheerful', 'disco', 'steampunk', 'underwater', 'robotic',
        'fiery', 'frozen', 'mossy', 'crystalline', 'noodly', 'inflatable', 'medieval',
        'radioactive', 'fancy', 'crooked', 'bubbly', 'thorny', 'velvet', 'neon',
    ];
    function randomInspiration() {
        return INSPIRATION_WORDS[Math.floor(Math.random() * INSPIRATION_WORDS.length)];
    }

    // Escapes user-generated text (comments, usernames) before it's injected into innerHTML.
    function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[c]));
    }

    // Shared replacement for the browser's native confirm() dialog — appended
    // directly to <body> (not #app) so it survives whichever screen's
    // app.innerHTML render triggered it. Resolves true/false like confirm() did.
    function showConfirmModal({ title, message, confirmLabel = 'Confirm', cancelLabel = 'Cancel', icon = '⚠️', confirmClass = 'bg-red-600 hover:bg-red-700', confirmTextClass = 'text-white' }) {
        return new Promise(resolve => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
            overlay.innerHTML = `
                <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
                    <div class="text-5xl mb-3">${icon}</div>
                    <p class="text-gray-700 font-semibold mb-1">${title}</p>
                    <p class="text-gray-500 text-sm mb-6">${message}</p>
                    <div class="flex gap-3">
                        <button class="confirmModalCancelBtn flex-1 px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl">${cancelLabel}</button>
                        <button class="confirmModalOkBtn flex-1 px-4 py-2.5 ${confirmClass} ${confirmTextClass} font-bold rounded-xl">${confirmLabel}</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            const close = result => { overlay.remove(); resolve(result); };
            overlay.addEventListener('click', e => { if (e.target === overlay) close(false); });
            overlay.querySelector('.confirmModalCancelBtn').addEventListener('click', () => close(false));
            overlay.querySelector('.confirmModalOkBtn').addEventListener('click', () => close(true));
        });
    }

    // Stronger confirmation than showConfirmModal above — password re-entry
    // plus a literal "type DELETE" field, both required before the button
    // enables — because unlike everything else showConfirmModal guards
    // (removing a favorite, canceling a game), this is genuinely
    // irreversible (hard delete, see data.js deleteUser). Resolves the
    // entered password on confirm, or null if the user backs out.
    function showDeleteAccountModal() {
        return new Promise(resolve => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
            overlay.innerHTML = `
                <div class="bg-white rounded-2xl p-8 max-w-sm w-full shadow-2xl">
                    <div class="text-5xl mb-3 text-center">⚠️</div>
                    <p class="text-gray-700 font-semibold mb-1 text-center">Delete your account?</p>
                    <p class="text-gray-500 text-sm mb-6 text-center">This permanently deletes your account, favorites, and friend connections. This can't be undone.</p>
                    <div class="space-y-3 mb-4">
                        <input id="deleteAccountPassword" type="password" placeholder="Enter your password"
                            class="w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-red-400">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Type DELETE to confirm</label>
                            <input id="deleteAccountConfirmText" type="text" placeholder="DELETE"
                                class="w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-red-400">
                        </div>
                    </div>
                    <p id="deleteAccountModalError" class="text-xs text-red-600 mb-3 hidden"></p>
                    <div class="flex gap-3">
                        <button class="deleteAccountCancelBtn flex-1 px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl">Cancel</button>
                        <button class="deleteAccountConfirmBtn flex-1 px-4 py-2.5 bg-red-600 text-white font-bold rounded-xl opacity-50 cursor-not-allowed" disabled>Delete forever</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);

            const passwordInput = overlay.querySelector('#deleteAccountPassword');
            const confirmTextInput = overlay.querySelector('#deleteAccountConfirmText');
            const confirmBtn = overlay.querySelector('.deleteAccountConfirmBtn');

            function updateEnabled() {
                const enabled = passwordInput.value.length > 0 && confirmTextInput.value.trim().toUpperCase() === 'DELETE';
                confirmBtn.disabled = !enabled;
                confirmBtn.className = `deleteAccountConfirmBtn flex-1 px-4 py-2.5 bg-red-600 text-white font-bold rounded-xl ${enabled ? 'hover:bg-red-700' : 'opacity-50 cursor-not-allowed'}`;
            }
            passwordInput.addEventListener('input', updateEnabled);
            confirmTextInput.addEventListener('input', updateEnabled);

            const close = result => { overlay.remove(); resolve(result); };
            overlay.addEventListener('click', e => { if (e.target === overlay) close(null); });
            overlay.querySelector('.deleteAccountCancelBtn').addEventListener('click', () => close(null));
            confirmBtn.addEventListener('click', () => {
                if (confirmBtn.disabled) return;
                close(passwordInput.value);
            });
        });
    }

    // Curated pick list for the lobby-icon emoji picker — kept small and fun
    // rather than a full system picker, since this is just personality, not identity.
    const EMOJI_CHOICES = ['🎨', '😀', '😎', '🤓', '🥳', '🤠', '👻', '🤖', '👽', '🐶', '🐱', '🦊', '🐼', '🦁', '🐸', '🐙', '🦄', '🐲', '🍕', '🍩', '🎩', '🚀', '⭐', '🔥', '🌈', '🍄', '🌵', '👑', '🎃'];
    // Resolves to the picked emoji, or null if the user backs out — matches
    // showConfirmModal's overlay-appended-to-body pattern so it works from any screen.
    function showEmojiPicker() {
        return new Promise(resolve => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
            overlay.innerHTML = `
                <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                    <p class="text-gray-700 font-semibold mb-3 text-center">Pick your icon</p>
                    <div class="grid grid-cols-6 gap-2 mb-4">
                        ${EMOJI_CHOICES.map(e => `<button class="emojiChoiceBtn text-2xl p-2 rounded-lg hover:bg-gray-100 transition-transform">${e}</button>`).join('')}
                    </div>
                    <button class="emojiCancelBtn w-full px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl">Cancel</button>
                </div>`;
            document.body.appendChild(overlay);
            const close = result => { overlay.remove(); resolve(result); };
            overlay.addEventListener('click', e => { if (e.target === overlay) close(null); });
            overlay.querySelector('.emojiCancelBtn').addEventListener('click', () => close(null));
            overlay.querySelectorAll('.emojiChoiceBtn').forEach(btn => {
                btn.addEventListener('click', () => close(btn.textContent));
            });
        });
    }

    // Shown next to the name field on the home screen's join/create forms. Any
    // account's uploaded avatar always wins in-game (see server's
    // playerIcon()), so there's nothing to pick here — just show it read-only.
    function renderIconPickerHtml(idPrefix) {
        if (S.authToken && S.user && S.user.avatarDataUrl) {
            return `<div class="w-10 h-10 shrink-0 rounded-full overflow-hidden border-2 border-gray-200" title="Your profile photo will be used">
                <img src="${S.user.avatarDataUrl}" class="w-full h-full object-cover">
            </div>`;
        }
        return `<button type="button" id="${idPrefix}EmojiBtn" class="emojiPickerBtn w-10 h-10 shrink-0 text-xl rounded-full border-2 border-gray-200 hover:border-[#ffec06] flex items-center justify-center transition-transform" title="Pick your icon">${escapeHtml(S.emoji || '🎨')}</button>`;
    }

    // Brief press animation + label swap on copy-to-clipboard buttons so the user
    // knows the click registered and the clipboard actually got the text.
    function flashCopied(btn) {
        if (btn.dataset.copying) return;
        btn.dataset.copying = '1';
        const original = btn.innerHTML;
        btn.classList.add('scale-90');
        setTimeout(() => btn.classList.remove('scale-90'), 150);
        btn.innerHTML = '✅ Copied!';
        setTimeout(() => {
            btn.innerHTML = original;
            delete btn.dataset.copying;
        }, 1400);
    }

    // The "someone beat you to the last spot" case shares this same UI, offering
    // "Start your own game" instead of a destructive confirm action.
    function showJoinFailedModal() {
        return showConfirmModal({
            title: 'Sorry, this drawing spot was taken.',
            message: 'The game is full or already underway — someone else beat you to it.',
            confirmLabel: 'Start your own game',
            cancelLabel: 'Cancel',
            icon: '😅',
            confirmClass: 'bg-[#ffec06] hover:bg-[#e6d405]',
            confirmTextClass: 'text-black',
        });
    }
    function isJoinFullOrStarted(e) {
        return e.message === 'Game is full' || e.message === 'Game already started';
    }

    // Shared by the Open Canvas Share modal and the Passthrough waiting
    // screen — creator-only, logged-in-only (anonymous creators have no
    // friends list to open the game to). PUTs the new state and keeps
    // S.game in sync so the rest of the UI reflects it without a full poll.
    function renderOpenToFriendsToggleHtml(checked) {
        return `
            <label class="flex items-center gap-2 justify-center cursor-pointer select-none">
                <input type="checkbox" id="openToFriendsToggle" class="w-4 h-4" ${checked ? 'checked' : ''}>
                <span class="text-sm text-gray-700">🎨 Let any friend join without the code</span>
            </label>`;
    }
    function wireOpenToFriendsToggle(container, code, playerId) {
        const toggle = container.querySelector('#openToFriendsToggle');
        if (!toggle) return;
        toggle.addEventListener('change', async () => {
            const open = toggle.checked;
            toggle.disabled = true;
            try {
                const data = await api(`/games/${code}/open-to-friends`, {
                    method: 'PUT',
                    body: JSON.stringify({ playerId, open }),
                });
                if (S.game && S.game.code === code) S.game.openToFriends = data.openToFriends;
            } catch (e) {
                toggle.checked = !open; // revert on failure
                alert('Could not update: ' + e.message);
            } finally {
                toggle.disabled = false;
            }
        });
    }

    // Same overlay-appended-to-body pattern as showConfirmModal/showEmojiPicker
    // — a code + copyable link, used by Open Canvas's in-game Share button.
    function showShareGameModal(code, opts = {}) {
        const { isCreator, openToFriends, playerId } = opts;
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
        overlay.innerHTML = `
            <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
                <div class="text-5xl mb-3">🔗</div>
                <p class="text-gray-700 font-semibold mb-4">Share this game</p>
                <div class="p-5 bg-[#fffce8] rounded-xl border-2 border-[#ffec06] mb-4">
                    <p class="text-sm text-gray-600 mb-1">Game Code</p>
                    <p class="text-3xl font-mono font-bold text-gray-900 tracking-widest">${code}</p>
                </div>
                <div class="flex gap-2 mb-4">
                    <button class="shareModalCopyCodeBtn flex-1 px-4 py-2 bg-[#ffec06] hover:bg-[#e6d405] text-black text-sm font-semibold rounded-lg transition-transform">📋 Copy code</button>
                    <button class="shareModalCopyLinkBtn flex-1 px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-semibold rounded-lg transition-transform">🔗 Copy invite link</button>
                </div>
                ${isCreator && S.authToken && S.user ? `
                    <div class="mb-4 pb-4 border-b border-gray-100">${renderOpenToFriendsToggleHtml(openToFriends)}</div>
                ` : ''}
                <button class="shareModalCloseBtn w-full px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl">Close</button>
            </div>`;
        document.body.appendChild(overlay);
        const close = () => overlay.remove();
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
        overlay.querySelector('.shareModalCloseBtn').addEventListener('click', close);
        overlay.querySelector('.shareModalCopyCodeBtn').addEventListener('click', e => {
            navigator.clipboard.writeText(code);
            flashCopied(e.currentTarget);
        });
        overlay.querySelector('.shareModalCopyLinkBtn').addEventListener('click', e => {
            navigator.clipboard.writeText(`${location.origin}/?code=${code}`);
            flashCopied(e.currentTarget);
        });
        if (isCreator && S.authToken && S.user) wireOpenToFriendsToggle(overlay, code, playerId);
    }

    // Letter-paper proportions (8.5 x 11). Free tier DRAWS at 100 DPI (850x1100)
    // — same live experience as always, no perf/UX change. Paid accounts draw
    // natively at 300 DPI (2550x3300). Resolution is fixed at draw-time per
    // player, based on whoever is holding the pen, not a post-hoc save-time boost.
    //
    // Every SUBMITTED section is normalized to OUTPUT_W x OUTPUT_H (the paid/300
    // DPI size) regardless of who drew it, so every sheet is uniform for
    // stitching/download/favorites — free drawings get upscaled into that frame
    // (genuinely softer, since the underlying detail is still only 100 DPI), paid
    // drawings already match natively.
    const BASE_CANVAS_W = 850, BASE_CANVAS_H = 1100, BASE_EDGE_H = 40;
    const PAID_RENDER_SCALE = 3; // 100 DPI -> 300 DPI
    const OUTPUT_W = BASE_CANVAS_W * PAID_RENDER_SCALE;   // 2550 — universal stored/stitched size
    const OUTPUT_H = BASE_CANVAS_H * PAID_RENDER_SCALE;   // 3300
    const OUTPUT_EDGE_H = BASE_EDGE_H * PAID_RENDER_SCALE; // 120
    const MAX_FAVORITES = 15;    // must match MAX_FAVORITES in data.js
    // Kill switch for the account-page "Subscribe" button (e.g. while the
    // Stripe subscription product/webhooks aren't configured yet) — lets the
    // free-account pivot ship without a broken button showing. Flip to true
    // once the Stripe Dashboard side (recurring price, webhook events,
    // Customer Portal) is set up.
    const SUBSCRIPTIONS_ENABLED = false;
    let CANVAS_W = BASE_CANVAS_W, CANVAS_H = BASE_CANVAS_H, EDGE_H = BASE_EDGE_H;
    let RENDER_SCALE = 1;

    function applyRenderScale() {
        // 300 DPI is a perk of having a free account (any account, not just
        // subscribers) — anonymous play stays at 100 DPI, partly to keep
        // canvas-heavy operations (flood fill, freehand drawing) cheap for
        // drive-by traffic that hasn't bothered to sign up.
        RENDER_SCALE = (S.authToken && S.user) ? PAID_RENDER_SCALE : 1;
        CANVAS_W = BASE_CANVAS_W * RENDER_SCALE;
        CANVAS_H = BASE_CANVAS_H * RENDER_SCALE;
        EDGE_H = BASE_EDGE_H * RENDER_SCALE;
        return RENDER_SCALE;
    }

    // ================= API =================
    async function api(path, opts = {}) {
        const res = await fetch('/api' + path, {
            headers: { 'Content-Type': 'application/json' },
            ...opts,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    // Same as api(), but attaches the Bearer auth token for account endpoints
    async function authApi(path, opts = {}) {
        const res = await fetch('/api' + path, {
            headers: {
                'Content-Type': 'application/json',
                ...(S.authToken ? { Authorization: `Bearer ${S.authToken}` } : {}),
            },
            ...opts,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    function setAuthSession(token, user) {
        S.authToken = token;
        S.user = user;
        localStorage.setItem('ec_authToken', token);
        startFriendsPolling();
    }

    function clearAuthSession() {
        S.authToken = null;
        S.user = null;
        localStorage.removeItem('ec_authToken');
        stopFriendsPolling();
    }

    async function refreshMe() {
        if (!S.authToken) return null;
        try {
            const { user } = await authApi('/account/me');
            S.user = user;
            return user;
        } catch (e) {
            // Token invalid/expired — log out silently
            clearAuthSession();
            return null;
        }
    }

    async function createGame(mode, timePerTurn, maxPlayers, openHeadcount) {
        const { code } = await api('/games', { method: 'POST', body: JSON.stringify({ mode, timePerTurn, maxPlayers, openHeadcount }) });
        S.code = code;
        sessionStorage.setItem('ec_code', code);
        return code;
    }

    // Every new match starts fresh — pen tool, black, default size — regardless of
    // whatever was left selected at the end of a previous match this session.
    function resetDrawingTools() {
        S.tool = 'pen';
        S.brushColor = '#000000';
        S.penSize = 5;
        S.eraserSize = 15;
        S.pencilSize = 6;
        S.brushSize = 12;
        S.airbrushSize = 30;
        S.splatSize = 22;
        S.splatterSize = 35;
        S.quillSize = 7;
        S.presetSizes = {};
        S.activeLayer = 1;
    }

    async function joinGame(code, name) {
        // Uses authApi (not api) so a logged-in player's userId gets attached
        // server-side, feeding the "games played together" friend stat — anonymous
        // players are unaffected since authApi only adds the header when S.authToken is set.
        const data = await authApi(`/games/${code}/join`, { method: 'POST', body: JSON.stringify({ name, emoji: S.emoji }) });
        S.code = code.toUpperCase();
        S.playerId = data.playerId;
        S.game = data;
        sessionStorage.setItem('ec_code', S.code);
        sessionStorage.setItem('ec_playerId', S.playerId);
        resetDrawingTools();
    }

    // Shared post-join/post-invite-accept routing: a 'passthrough' game can already
    // be 'active' the moment you join it (no lobby step) — same N-sheet rotation
    // as the other modes, just skipping the wait-for-everyone-to-join lobby.
    function routeToGameScreen(data) {
        if (data.status === 'waiting') {
            S.screen = 'lobby';
        } else if (data.status === 'completed') {
            S.screen = 'results';
        } else if (data.status === 'active') {
            if (data.mode === 'opencanvas') {
                S.screen = 'canvas';
                resetDrawingTools();
            } else {
                S.screen = 'draw';
                S.lastRound = data.round;
                S.submittedThisRound = data.you ? data.you.submitted : false;
                resetDrawingTools();
            }
        }
    }

    // Jumps into a game the user is already a player in (from the "continue a
    // drawing" banner or the multi-game picker) — mirrors the accept-invite flow.
    async function enterMyGame(entry) {
        S.code = entry.code;
        S.playerId = entry.playerId;
        sessionStorage.setItem('ec_code', S.code);
        sessionStorage.setItem('ec_playerId', S.playerId);
        try {
            const data = await api(`/games/${S.code}?playerId=${S.playerId}`);
            S.game = data;
            routeToGameScreen(data);
            render();
            startPolling();
        } catch (e) {
            alert('Could not open that drawing: ' + e.message);
        }
    }

    // Shows a "continue a drawing" prompt on the home screen when a logged-in
    // user has a 'passthrough' game (or several) waiting on their turn — non-
    // critical, so a failed fetch just leaves the banner empty rather than erroring.
    async function loadContinueBanner() {
        const banner = document.getElementById('continueBanner');
        if (!banner) return;
        try {
            const { games: mine } = await authApi('/games/mine');
            const needing = mine.filter(g => g.needsSubmission);
            if (needing.length === 0) return;

            if (needing.length === 1) {
                const g = needing[0];
                const label = g.continuingFrom ? `Continue ${escapeHtml(g.continuingFrom)}'s creation` : 'Continue your creation';
                banner.innerHTML = `
                    <button id="continueSingleBtn" class="w-full mb-6 px-4 py-3 bg-amber-50 hover:bg-amber-100 border-2 border-amber-300 rounded-xl text-left flex items-center justify-between transition">
                        <span class="font-semibold text-amber-800">🎨 ${label} — ${SECTION_LABELS[g.section] || ''}</span>
                        <span class="text-amber-600">&rarr;</span>
                    </button>`;
                document.getElementById('continueSingleBtn').addEventListener('click', () => enterMyGame(g));
            } else {
                banner.innerHTML = `
                    <button id="continueMultiBtn" class="w-full mb-6 px-4 py-3 bg-amber-50 hover:bg-amber-100 border-2 border-amber-300 rounded-xl text-left flex items-center justify-between transition">
                        <span class="font-semibold text-amber-800">🎨 You have ${needing.length} drawings waiting</span>
                        <span class="text-amber-600">&rarr;</span>
                    </button>`;
                document.getElementById('continueMultiBtn').addEventListener('click', () => {
                    S.myGamesList = needing;
                    S.screen = 'myGames';
                    render();
                });
            }
        } catch (e) { /* non-critical — leave the banner empty */ }
    }

    // Shows "a friend's game is open — join" prompts on the home screen —
    // games where a friend flipped the "let any friend join" toggle on
    // (see wireOpenToFriendsToggle). Distinct from loadContinueBanner above
    // (that's the player's OWN unfinished passthrough turns); this is
    // discovering someone else's in-progress game via friendship, no code
    // needed. Non-critical, same fail-quiet pattern.
    async function loadFriendsOpenGamesBanner() {
        const banner = document.getElementById('friendsOpenGamesBanner');
        if (!banner) return;
        try {
            const { games: open } = await authApi('/friends/open-games');
            if (!open.length) { banner.innerHTML = ''; return; }

            banner.innerHTML = open.map((g, i) => `
                <button data-idx="${i}" class="friendOpenGameBtn w-full mb-3 px-4 py-3 bg-teal-50 hover:bg-teal-100 border-2 border-teal-300 rounded-xl text-left flex items-center justify-between transition">
                    <span class="font-semibold text-teal-800">🎨 ${escapeHtml(g.creatorName)}'s game is open — join${g.mode === 'opencanvas' ? ' the canvas' : ''}</span>
                    <span class="text-teal-600">&rarr;</span>
                </button>
            `).join('');

            banner.querySelectorAll('.friendOpenGameBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const g = open[Number(btn.dataset.idx)];
                    btn.disabled = true;
                    try {
                        await joinGame(g.code, S.user.username);
                        routeToGameScreen(S.game);
                        render();
                        startPolling();
                    } catch (e) {
                        btn.disabled = false;
                        alert(isJoinFullOrStarted(e) ? "That spot's gone — someone beat you to it." : 'Could not join: ' + e.message);
                    }
                });
            });
        } catch (e) { /* non-critical — leave the banner empty */ }
    }

    // ---------- MY GAMES (picker) ----------
    function renderMyGames() {
        const list = S.myGamesList || [];
        app.innerHTML = `
        <div class="min-h-screen app-bg p-4 flex items-center justify-center">

                    <p class="text-sm text-gray-400 mb-6">Pick which one you're working on.</p>

                    <div class="space-y-3">
                        ${list.map((g, i) => `
                            <button data-idx="${i}" class="myGameBtn w-full px-4 py-3 bg-amber-50 hover:bg-amber-100 border-2 border-amber-300 rounded-xl text-left flex items-center justify-between transition">

    async function pollState() {
        if (!S.code) return;
        try {
            const data = await api(`/games/${S.code}?playerId=${S.playerId || ''}`);
            const prev = S.game;
            S.game = data;
            onStateUpdate(prev, data);
        } catch (e) {
            if (e.message === 'Game not found') {
                stopPolling();
                clearSession();
                S.screen = 'home';
                S.error = 'That game no longer exists.';
                render();
            }
        }
    }

    function startPolling() {
        stopPolling();
        S.pollTimer = setInterval(pollState, 2000);
    }
    function stopPolling() {
        if (S.pollTimer) clearInterval(S.pollTimer);
        S.pollTimer = null;
    }
    function clearSession() {
        S.code = null; S.playerId = null; S.game = null;
        sessionStorage.removeItem('ec_code');
        sessionStorage.removeItem('ec_playerId');
    }

    // Screens where the poll loop is allowed to auto-jump the user around
    // (lobby -> draw -> results) as the game progresses. Outside of these —
    // e.g. a premium player who wandered off to their profile while a
    // 'passthrough' game sits waiting — polling keeps S.game fresh and still
    // fires notifications, but never yanks the screen out from under them.
    const GAME_ACTIVE_SCREENS = new Set(['lobby', 'draw', 'canvas', 'results']);

    function onStateUpdate(prev, cur) {
        const inGameFlow = GAME_ACTIVE_SCREENS.has(S.screen);

        if (cur.status === 'waiting') {
            if (!inGameFlow) return;
            if (S.screen !== 'lobby') { S.screen = 'lobby'; render(); }
            else updateLobby(cur);
        } else if (cur.status === 'active' && cur.mode === 'opencanvas') {
            // No rounds to diff — this poll only exists to catch the initial
            // waiting->active transition and keep the player roster fresh.
            // The canvas's actual pixels are driven entirely by the WebSocket.
            if (!inGameFlow) return;
            if (S.screen !== 'canvas') {
                S.screen = 'canvas';
                resetDrawingTools();
                render();
            } else {
                updateCanvasPlayerList(cur);
            }
        } else if (cur.status === 'active') {
            const roundChanged = S.lastRound !== cur.round;
            if (roundChanged) {
                S.lastRound = cur.round;
                S.submittedThisRound = cur.you ? cur.you.submitted : false;
                if (inGameFlow) {
                    resetDrawingTools(); // every round starts back on pen/black, regardless of what was picked last round
                    S.screen = 'draw';
                    render();
                }
                // Round 1 fires immediately after everyone's already looking at the
                // screen (right after Start Game) — only notify for later rounds,
                // when someone may have wandered off waiting for their turn.
                if (cur.round > 1 && cur.you && !cur.you.submitted) {
                    maybeNotify('Your turn! 🎨', `Round ${cur.round}: draw the ${cur.section}.`);
                }
            } else if (!inGameFlow) {
                return;
            } else if (S.screen !== 'draw') {
                S.screen = 'draw';
                S.submittedThisRound = cur.you ? cur.you.submitted : false;
                render();
            } else if (cur.mode === 'passthrough' && S.submittedThisRound) {
                // Passthrough's "waiting" view also shows an invite-more-artists block
                // while the roster isn't full yet — cheap enough to just fully
                // re-render each poll (e.g. once another artist joins). Guarded by
                // S.submittedThisRound so an active drawer's canvas is never touched.
                render();
            } else {
                updateWaitingStatus(cur);
            }
        } else if (cur.status === 'completed') {
            stopPolling();
            disconnectCanvasSocket();
            if (inGameFlow && S.screen !== 'results') {
                S.screen = 'results';
                render();
            }
            maybeNotify('The reveal is ready! 🎉', 'All artists are done — come see the creations.');
        }
    }

    // ---------- NOTIFICATIONS ----------
    // "Simple" tier: uses the Notification API, which only fires while this tab
    // stays open somewhere (even backgrounded) — not true push. Good enough for
    // "I'll check back later today" without babysitting the tab; won't survive
    // fully closing it. Real push (works when closed) would need a service
    // worker + subscriptions, a bigger build for later if this isn't enough.
    function canNotify() {
        return 'Notification' in window && S.notifyEnabled && Notification.permission === 'granted';
    }

    async function requestNotifyPermission() {
        if (!('Notification' in window)) {
            alert("Your browser doesn't support notifications.");
            return false;
        }
        const perm = await Notification.requestPermission();
        S.notifyEnabled = perm === 'granted';
        localStorage.setItem('ec_notifyEnabled', String(S.notifyEnabled));
        return S.notifyEnabled;
    }

    function maybeNotify(title, body) {
        if (!canNotify()) return;
        if (!document.hidden && document.hasFocus()) return; // already looking, skip
        try {
            const n = new Notification(title, { body });
            n.onclick = () => { window.focus(); n.close(); };
        } catch (e) { /* ignore — some browsers restrict this in odd contexts */ }
    }

    // Shared toggle UI reused on the lobby and waiting screens
    function renderNotifyToggle() {
        if (!('Notification' in window)) return '';
        if (Notification.permission === 'denied') {
            return `<p class="text-xs text-gray-400 text-center mt-3">🔕 Notifications are blocked in your browser settings</p>`;
        }
        const enabled = S.notifyEnabled && Notification.permission === 'granted';
        return `
        <button id="notifyToggleBtn" class="w-full mt-3 px-3 py-2 text-sm font-medium rounded-lg border ${enabled ? 'bg-[#fffce8] text-black border-[#ffec06]' : 'bg-gray-50 hover:bg-gray-100 text-gray-500 border-gray-200'}">
            ${enabled ? "🔔 Notifying you when it's your turn" : '🔔 Notify me when it\'s my turn'}
        </button>`;
    }

    // Second, independent poll (separate from the in-game turn poll) that only
    // does anything while authenticated and viewing home/account/a friend's
    // profile — no point polling for social notifications mid-drawing.
    let friendsPollTimer = null;

    function getSeenIds(key) {
        try { return new Set(JSON.parse(sessionStorage.getItem(key) || '[]')); }
        catch (e) { return new Set(); }
    }
    function saveSeenIds(key, ids) {
        sessionStorage.setItem(key, JSON.stringify(ids));
    }

    async function pollFriendsOnce() {
        if (!S.authToken) return;
        if (!['home', 'account', 'friendProfile'].includes(S.screen)) return;
        try {
            const [reqRes, invRes, openRes] = await Promise.all([
                authApi('/friends/requests'),
                authApi('/friends/invites'),
                authApi('/friends/open-games'),
            ]);

            const seenReq = getSeenIds('ec_seenFriendReqs');
            reqRes.incoming.forEach(r => {
                if (!seenReq.has(r.userId)) maybeNotify('New friend request', `${r.username} wants to be friends`);
            });
            saveSeenIds('ec_seenFriendReqs', reqRes.incoming.map(r => r.userId));

            const seenInv = getSeenIds('ec_seenInvites');
            invRes.invites.forEach(i => {
                if (!seenInv.has(i.id)) maybeNotify('Game invite', `${i.fromUsername} invited you to play`);
            });
            saveSeenIds('ec_seenInvites', invRes.invites.map(i => i.id));

            const seenOpen = getSeenIds('ec_seenOpenGames');
            openRes.games.forEach(g => {
                if (!seenOpen.has(g.code)) maybeNotify("Friend's game is open", `${g.creatorName}'s game is open to join`);
            });
            saveSeenIds('ec_seenOpenGames', openRes.games.map(g => g.code));
        } catch (e) { /* best-effort — a missed poll tick just means a delayed notification */ }
    }

    function startFriendsPolling() {
        stopFriendsPolling();
        if (!S.authToken) return;
        friendsPollTimer = setInterval(pollFriendsOnce, 15000);
    }
    function stopFriendsPolling() {
        if (friendsPollTimer) clearInterval(friendsPollTimer);
        friendsPollTimer = null;
    }

    function wireNotifyToggle() {
        const btn = document.getElementById('notifyToggleBtn');
        if (!btn) return;
        btn.addEventListener('click', async () => {
            if (S.notifyEnabled && Notification.permission === 'granted') {
                S.notifyEnabled = false;
                localStorage.setItem('ec_notifyEnabled', 'false');
            } else {
                await requestNotifyPermission();
            }
            render();
        });
    }

    // ================= RENDER =================
    function render() {
        if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
        window.onresize = null;
        if (S.screen === 'home') renderHome();
        else if (S.screen === 'lobby') renderLobby();
        else if (S.screen === 'draw') renderDraw();
        else if (S.screen === 'canvas') renderCanvasMode();
        else if (S.screen === 'results') renderResults();
        else if (S.screen === 'signup') renderSignup();
        else if (S.screen === 'login') renderLogin();
        else if (S.screen === 'forgotPassword') renderForgotPassword();
        else if (S.screen === 'account') renderAccount();
        else if (S.screen === 'friendProfile') renderFriendProfile();
        else if (S.screen === 'checkoutPending') renderCheckoutPending();
        else if (S.screen === 'about') renderAbout();
        else if (S.screen === 'myGames') renderMyGames();
        updatePhotoCredit();
    }

            document.getElementById('signupLink').addEventListener('click', () => {
                S.screen = 'signup';
                render();
            });
        }

        const modeLabels = { async: 'modeAsyncLabel', timed: 'modeTimedLabel', passthrough: 'modePassthroughLabel', opencanvas: 'modeOpenCanvasLabel' };
        // Slider value '1' is the "?" open-headcount step, below the real
        // minimum of 2 — only meaningful for non-passthrough modes.
        function playerCountLabel(n) { return n === '1' ? '?' : n; }
        function updatePlayerCountHint(mode, n) {
            const hint = document.getElementById('playerCountHint');
            if (n === '1') {
                hint.textContent = "Anyone with the link can join — you'll decide when to start, and the roster locks in at whatever headcount you've got then.";
            } else if (mode === 'passthrough') {
                hint.textContent = n === '2'
                    ? 'Each of you draws a head on your own sheet, then you swap for the torso, then swap back for the legs — no need to be online at the same time.'
                    : 'Each of you draws a head on your own sheet, then sheets rotate for the torso and legs — no need to be online at the same time.';
            } else if (mode === 'opencanvas') {
                hint.textContent = 'Everyone draws on the same canvas at the same time — see each other\'s cursors and strokes live. Anyone can finish it for the group.';
            } else {
                hint.textContent = n === '2'
                    ? 'With 2 players, your sheets simply swap back and forth each round.'
                    : 'Everyone draws every round — more artists means more creations, not a longer game.';
            }
        }
        document.querySelectorAll('input[name="mode"]').forEach(r => {
            r.addEventListener('change', e => {
                const mode = e.target.value;
                document.getElementById('timerOption').classList.toggle('hidden', mode !== 'timed');
                Object.entries(modeLabels).forEach(([m, id]) => {
                    document.getElementById(id).style.cssText = m === mode ? 'border-color:#ffec06;background:#fffce8' : '';
                });
                const slider = document.getElementById('playerCountSlider');
                if (mode === 'passthrough') {
                    slider.min = 2; slider.max = 3; slider.value = 2;
                } else {
                    slider.min = 1; slider.max = 20; slider.value = 1;
                }
                document.getElementById('playerCountValue').textContent = playerCountLabel(slider.value);
                updatePlayerCountHint(mode, slider.value);
            });
        });
        document.getElementById('playerCountSlider').addEventListener('input', e => {
            const n = e.target.value;
            const mode = document.querySelector('input[name="mode"]:checked').value;
            document.getElementById('playerCountValue').textContent = playerCountLabel(n);
            updatePlayerCountHint(mode, n);
        });
        document.getElementById('timerSlider').addEventListener('input', e => {
            document.getElementById('timerValue').textContent = e.target.value;
        });

        document.getElementById('createBtn').addEventListener('click', async () => {
            const name = document.getElementById('createName').value.trim();
            if (!name) return showHomeError('Enter your name to create a game.');
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const timePerTurn = parseInt(document.getElementById('timerSlider').value);
            const sliderVal = document.getElementById('playerCountSlider').value;
            const openHeadcount = mode !== 'passthrough' && sliderVal === '1';
            const maxPlayers = openHeadcount ? undefined : Number(sliderVal);
            try {
                const code = await createGame(mode, timePerTurn, maxPlayers, openHeadcount);
                await joinGame(code, name);
                routeToGameScreen(S.game);
                render();
                startPolling();
            } catch (e) { showHomeError(e.message); }
        });

        document.getElementById('joinBtn').addEventListener('click', doJoin);
        document.getElementById('joinName').addEventListener('keypress', e => { if (e.key === 'Enter') doJoin(); });

        // Both the join and create forms share one global icon pick — picking it
        // from either button updates both, since it's really "your icon", not
        // per-form. Absent entirely when a paid avatar is already shown instead.
        document.querySelectorAll('.emojiPickerBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const picked = await showEmojiPicker();
                if (!picked) return;
                S.emoji = picked;
                localStorage.setItem('ec_emoji', picked);
                document.querySelectorAll('.emojiPickerBtn').forEach(b => { b.textContent = picked; });
            });
        });

        async function doJoin() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            const name = document.getElementById('joinName').value.trim();
            if (code.length !== 6) return showHomeError('Game codes are 6 characters.');
            if (!name) return showHomeError('Enter your name to join.');
            try {
                await joinGame(code, name);
                routeToGameScreen(S.game);
                render();
                startPolling();
            } catch (e) {
                // A shared link can get clicked by several people at once — whoever
                // loses the race to the last spot gets a clear next step instead of
                // a dead-end error, especially since passthrough invites are meant
                // to be shared widely on a premium account.
                if (isJoinFullOrStarted(e)) {
                    const startOwnGame = await showJoinFailedModal();
                    if (startOwnGame) {
                        const createName = document.getElementById('createName');
                        if (name) createName.value = name;
                        createName.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        createName.focus();
                    }
                } else {
                    showHomeError(e.message);
                }
            }
        }

        function showHomeError(msg) { S.error = msg; renderHome(); }
    }

                    <div class="space-y-4 text-gray-700 leading-relaxed">
                        <p>Exquisite Corpse — from the French <i>cadavre exquis</i>, "exquisite cadaver" — is a nearly hundred-year-old collaborative drawing game invented in Paris in 1925 by a circle of Surrealist artists and writers, including André Breton, Yves Tanguy, and Jacques Prévert. It grew out of an older parlor game called Consequences, where players wrote in turn on a folded sheet of paper, each unable to see what came before.</p>
                        <p>The unsettling name comes from one of the very first sentences the group produced playing a word version of the game: <i>"Le cadavre exquis boira le vin nouveau"</i> — "The exquisite corpse shall drink the new wine." The phrase was strange enough to stick, and so did the game.</p>

    function updateLobby(g) {
        const list = document.getElementById('playerList');
        const actions = document.getElementById('lobbyActions');
        if (!list || !actions) return;

        // Open headcount: show only artists who've actually joined (no ghost
        // "waiting for artist" placeholders, since there's no fixed target).
        const slotCount = g.openHeadcount ? g.players.length : g.maxPlayers;
        list.innerHTML = Array.from({ length: slotCount }, (_, i) => i).map(i => {
            const p = g.players[i];
            const isYou = p && g.you && p.order === g.you.order;
            const icon = !p ? `<span class="text-2xl">💤</span>`
                : p.avatarDataUrl ? `<img src="${p.avatarDataUrl}" class="w-8 h-8 rounded-full object-cover">`
                : `<span class="text-2xl">${p.emoji || '🎨'}</span>`;
            return `
            <div class="p-4 rounded-xl border-2 ${p ? 'bg-[#fffce8] border-[#ffec06]' : 'bg-gray-50 border-dashed border-gray-300'}">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        ${icon}
                        <p class="font-semibold ${p ? '' : 'text-gray-400'}">${p ? p.name : 'Waiting for artist...'}</p>
                    </div>
                    ${isYou ? '<span class="text-xs font-bold text-black bg-[#ffec06] px-2 py-1 rounded-full">YOU</span>' : ''}
                </div>
            </div>`;
        }).join('') + (g.openHeadcount ? `<p class="text-xs text-gray-400 text-center">${g.players.length} artist${g.players.length === 1 ? '' : 's'} joined so far</p>` : '');

        const isCreator = g.you && g.you.order === 1;
        // Open Canvas has no rotation to fill sheets for, so a lone creator
        // can start (and just draw solo, or wait for others via the share
        // link before/while creating) — every other mode still needs 2.
        const openMinPlayers = g.mode === 'opencanvas' ? 1 : 2;
        const isFull = g.openHeadcount ? g.players.length >= openMinPlayers : g.players.length === g.maxPlayers;
        if (isFull && isCreator) {
            actions.innerHTML = `<button id="startBtn" class="w-full px-6 py-4 bg-[#ffec06] hover:bg-[#e6d405] text-black font-bold rounded-xl text-lg">🚀 Start Game</button>`;
            document.getElementById('startBtn').addEventListener('click', async () => {
                try {
                    await api(`/games/${S.code}/start`, { method: 'POST', body: JSON.stringify({ playerId: S.playerId }) });
                    pollState();
                } catch (e) { alert(e.message); }
            });
        } else if (g.openHeadcount) {
            actions.innerHTML = isCreator
                ? `<p class="text-center text-gray-500">Share the code — start whenever you're ready${openMinPlayers > 1 ? ` (at least ${openMinPlayers} needed)` : ''}.</p>`
                : `<p class="text-center text-gray-500">Waiting for <b>${g.players[0].name}</b> to start the game...</p>`;
        } else if (isFull) {
            actions.innerHTML = `<p class="text-center text-gray-500">Everyone's here! Waiting for <b>${g.players[0].name}</b> to start...</p>`;
        } else {
            const remaining = g.maxPlayers - g.players.length;
            actions.innerHTML = `<p class="text-center text-gray-500">Waiting for ${remaining} more artist${remaining === 1 ? '' : 's'}... share the code!</p>`;
        }
    }

    function fitPaper() {
        const stack = document.getElementById('canvasStack');
        const hint = document.getElementById('edgeHintImg');
        const area = document.getElementById('paperArea');
        if (!stack || !area) return;

        const hintH = hint ? EDGE_H : 0;
        const totalH = CANVAS_H + hintH;
        const availW = area.clientWidth - 16;
        const availH = area.clientHeight - 16;
        const scale = Math.min(availW / CANVAS_W, availH / totalH);

        const w = (CANVAS_W * scale) + 'px';
        const h = (CANVAS_H * scale) + 'px';
        stack.style.width = w;
        stack.style.height = h;
        document.querySelectorAll('.layerCanvas').forEach(c => {
            c.style.width = w;
            c.style.height = h;
        });
        if (hint) {
            hint.style.width = w;
            hint.style.height = (EDGE_H * scale) + 'px';
        }
    }

    // Two layers: 0 = background/fill (bottom), 1 = line art (top, default active).
    // Both canvases start transparent — the white "paper" comes from #canvasStack's
    // own background, so erasing on either layer just reveals the paper beneath.
    function setupCanvas() {
        const canvases = [document.getElementById('layerCanvas0'), document.getElementById('layerCanvas1')];
        const ctxs = canvases.map(c => c.getContext('2d', { willReadFrequently: true }));
        ctxs.forEach(ctx => { ctx.lineCap = 'round'; ctx.lineJoin = 'round'; });
        S.undoStacks = [[], []];

        const topCanvas = canvases[1]; // always receives pointer events, regardless of active layer

        fitPaper();
        requestAnimationFrame(fitPaper); // re-fit after first layout settles
        window.onresize = fitPaper;

        let activePointer = null;   // only one finger/pen draws at a time
        let penSeen = false;        // once a stylus is used, ignore finger touches (palm rejection)
        let last = null;            // previous point for segment drawing
        let lastWidth = 0;          // previous point's line width, so segments can taper smoothly between them

        function pos(e) {
            const rect = topCanvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (CANVAS_W / rect.width),
                y: (e.clientY - rect.top) * (CANVAS_H / rect.height),
            };
        }

        // Pressure-aware width: Apple Pencil / stylus varies 0..1, mouse & touch report 0.5
        let lastBrushPressure = 0.5; // carries forward across a stroke's noisy samples; reseeded on each pointerdown
        function widthFor(e) {
            // Multiply by RENDER_SCALE so a given brush size looks the same
            // physical thickness on the page regardless of underlying resolution
            const sizeMap = { eraser: S.eraserSize, pencil: S.pencilSize, brush: S.brushSize };
            const base = (sizeMap[S.tool] ?? S.penSize) * RENDER_SCALE;
            if (S.tool === 'brush') {
                // Brush is stylus-only, so pressure is always meaningful here —
                // a much wider swing than pen's subtle variation, closer to a
                // real ink brush going from a hair-thin touch to a full stroke.
                // Some stylus/browser combos report a spurious 0 pressure for an
                // occasional coalesced sample mid-stroke — falling back to a
                // fixed value there snaps the width to a generic blob and
                // breaks the taper, so we carry forward the last real reading.
                const pressure = e.pressure > 0 ? e.pressure : lastBrushPressure;
                lastBrushPressure = pressure;
                return Math.max(0.4, base * (0.08 + pressure * 2.2));
            }
            if (e.pointerType === 'pen' && e.pressure > 0) {
                return Math.max(0.5, base * (0.3 + e.pressure * 1.4));
            }
            return base;
        }

        // Subdivides a segment into short steps that interpolate width linearly.
        // A fast stroke can jump a long distance between two pointer samples —
        // stroking that whole jump as one segment leaves the round cap's radius
        // changing abruptly from the previous segment's, which reads as a stray
        // "blob" wherever pressure/taper made the width shift a lot between
        // samples. Shorter interpolated steps keep consecutive caps blending
        // into each other instead of stacking into a lump.
        function strokeTaperedSegment(ctx, from, to, fromWidth, toWidth) {
            const dx = to.x - from.x, dy = to.y - from.y;
            const dist = Math.hypot(dx, dy);
            const maxWidth = Math.max(fromWidth, toWidth, 1);
            const step = Math.max(1, maxWidth * 0.5);
            const steps = Math.max(1, Math.ceil(dist / step));
            let px = from.x, py = from.y;
            for (let i = 1; i <= steps; i++) {
                const t = i / steps;
                const x = from.x + dx * t;
                const y = from.y + dy * t;
                ctx.lineWidth = fromWidth + (toWidth - fromWidth) * t;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(x, y);
                ctx.stroke();
                px = x; py = y;
            }
        }

        function drawSegment(from, to, fromWidth, toWidth) {
            const ctx = ctxs[S.activeLayer];
            ctx.globalCompositeOperation = S.tool === 'eraser' ? 'destination-out' : 'source-over';

            if (S.tool === 'pencil') {
                drawGrainySegment(ctx, from, to, (fromWidth + toWidth) / 2);
                return;
            }

            ctx.strokeStyle = S.brushColor;
            strokeTaperedSegment(ctx, from, to, fromWidth, toWidth);
        }

        // Scatters small jittered, semi-transparent specks along the segment
        // instead of a flat stroke — reads as grainy graphite rather than a
        // clean marker line, regardless of input device.
        function drawGrainySegment(ctx, from, to, width) {
            const dx = to.x - from.x, dy = to.y - from.y;
            const dist = Math.hypot(dx, dy) || 0.01;
            const r = Math.max(1, width) / 2;
            const step = Math.max(1, r * 0.7);
            const steps = Math.max(1, Math.ceil(dist / step));
            const fr = parseInt(S.brushColor.slice(1, 3), 16);
            const fg = parseInt(S.brushColor.slice(3, 5), 16);
            const fb = parseInt(S.brushColor.slice(5, 7), 16);

            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const cx = from.x + dx * t;
                const cy = from.y + dy * t;
                for (let s = 0; s < 3; s++) {
                    const angle = Math.random() * Math.PI * 2;
                    const rad = Math.random() * r;
                    const px = cx + Math.cos(angle) * rad;
                    const py = cy + Math.sin(angle) * rad;
                    const alpha = 0.12 + Math.random() * 0.28;
                    const size = Math.max(0.4, r * (0.15 + Math.random() * 0.35));
                    ctx.beginPath();
                    ctx.fillStyle = `rgba(${fr}, ${fg}, ${fb}, ${alpha})`;
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        const BRUSH_TAPER_IN_POINTS = 6;   // how many points it takes to ramp up to full pressure width
        const BRUSH_TAPER_OUT_POINTS = 8;  // how many trailing points get tapered back down to a point
        let brushStroke = []; // {x, y, width} for the in-progress brush stroke, used to taper the tail on lift-off

        function brushTaperInFactor(pointIndex) {
            return Math.min(1, (pointIndex + 1) / BRUSH_TAPER_IN_POINTS);
        }

        // Real ink brushes lift off the page rather than ending in a blunt cap.
        // The live-drawn tail already has ink at near-full width, so this erases
        // just that tail and redraws it tapering down to a point.
        function finishBrushTaper() {
            if (brushStroke.length < 2) { brushStroke = []; return; }
            const ctx = ctxs[S.activeLayer];
            const tailStart = Math.max(0, brushStroke.length - BRUSH_TAPER_OUT_POINTS);
            const tail = brushStroke.slice(tailStart);

            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineCap = 'round';
            for (let i = 1; i < tail.length; i++) {
                strokeTaperedSegment(ctx, tail[i - 1], tail[i], tail[i - 1].width + 3, tail[i].width + 3);
            }

            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = S.brushColor;
            // 0 at the tail's start, 1 at the very last point
            const taperedWidths = tail.map((pt, i) => {
                const taper = 1 - i / (tail.length - 1);
                return Math.max(0.3, pt.width * (0.08 + taper * 0.92));
            });
            for (let i = 1; i < tail.length; i++) {
                strokeTaperedSegment(ctx, tail[i - 1], tail[i], taperedWidths[i - 1], taperedWidths[i]);
            }

            brushStroke = [];
        }

        // ---- Airbrush: a continuous particle spray, not a path-stroked line ----
        // Real airbrushes keep depositing paint while held still — that's how
        // artists build up shading in one spot — so this runs on a rAF loop for
        // as long as the pointer is down, independent of pointermove events,
        // rather than only drawing when the path advances like the other tools.
        let airbrushRaf = null;
        let airbrushTarget = null;   // {x, y} — updated by pointermove, read by the spray loop
        let lastAirbrushPressure = 0.5;

        // Mouse/touch report no meaningful pressure, so they get one fixed
        // mid-value for both softness and density instead of snapping to an
        // extreme. A stylus's occasional spurious 0 reading also falls back to
        // the last real value rather than a hard reset, same fix as the brush.
        function airbrushPressureFor(e) {
            if (e.pointerType !== 'pen') return 0.5;
            const pressure = e.pressure > 0 ? e.pressure : lastAirbrushPressure;
            lastAirbrushPressure = pressure;
            return pressure;
        }

        // A real spray's soft-edged look comes from the DENSITY of tiny specks
        // fading out with distance, not from each speck itself having a soft
        // gradient edge — a few dozen large translucent gradient blobs just
        // stack into a scaly, reptile-skin texture instead of a fine mist.
        // So each speck here is a small, mostly-opaque solid dot; the falloff
        // comes from biasing more of them to land near the center and fewer
        // out toward the edge.
        function airbrushTick() {
            if (!airbrushTarget) return;
            const ctx = ctxs[S.activeLayer];
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = S.brushColor;

            const radius = S.airbrushSize * RENDER_SCALE;
            const pressure = lastAirbrushPressure;
            // Density: how many mist specks land this frame.
            const specksThisFrame = Math.round(20 + pressure * 70);
            // Softness: lighter pressure spreads the mist wider and thins out
            // the edge faster; harder pressure concentrates it into a denser,
            // more tightly-bounded cone.
            const spreadRadius = radius * (1.6 - pressure * 0.7);
            const baseOpacity = 0.3 + pressure * 0.4;

            for (let i = 0; i < specksThisFrame; i++) {
                const angle = Math.random() * Math.PI * 2;
                // Biasing distance toward 0 (via a power > 1) means most specks
                // land near the center and progressively fewer land further
                // out — that density gradient IS the soft edge.
                const dist = Math.pow(Math.random(), 2.2) * spreadRadius;
                const x = airbrushTarget.x + Math.cos(angle) * dist;
                const y = airbrushTarget.y + Math.sin(angle) * dist;
                // Mostly pinpoint specks, occasionally a slightly bigger droplet.
                const speckRadius = Math.max(0.3, radius * (0.01 + Math.pow(Math.random(), 4) * 0.05));
                ctx.globalAlpha = baseOpacity * (0.5 + Math.random() * 0.5);
                ctx.beginPath();
                ctx.arc(x, y, speckRadius, 0, Math.PI * 2);
                ctx.fill();
            }

            // Rare larger splatter drops, like real spray paint kicks out among
            // the fine mist — subtle, so it reads as texture, not blotches.
            if (Math.random() < 0.04) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.pow(Math.random(), 1.5) * spreadRadius * 1.2;
                const x = airbrushTarget.x + Math.cos(angle) * dist;
                const y = airbrushTarget.y + Math.sin(angle) * dist;
                ctx.globalAlpha = 0.7 + Math.random() * 0.3;
                ctx.beginPath();
                ctx.arc(x, y, radius * (0.05 + Math.random() * 0.07), 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.globalAlpha = 1;
            airbrushRaf = requestAnimationFrame(airbrushTick);
        }

        function startAirbrush(p, e) {
            airbrushTarget = p;
            lastAirbrushPressure = airbrushPressureFor(e);
            airbrushRaf = requestAnimationFrame(airbrushTick);
        }

        function stopAirbrush() {
            if (airbrushRaf !== null) cancelAnimationFrame(airbrushRaf);
            airbrushRaf = null;
            airbrushTarget = null;
        }

        // ---- Ink Splatter: same hold-to-keep-flicking architecture as the
        // airbrush (rAF loop, pointermove just retargets), but each frame
        // stamps a few chunky opaque drops instead of a mist. ----
        let splatterRaf = null;
        let splatterTarget = null;
        let lastSplatterPressure = 0.5;
        function splatterPressureFor(e) {
            if (e.pointerType !== 'pen') return 0.5;
            const pressure = e.pressure > 0 ? e.pressure : lastSplatterPressure;
            lastSplatterPressure = pressure;
            return pressure;
        }
        function splatterTick() {
            if (!splatterTarget) return;
            inkStampSplatterFrame(ctxs[S.activeLayer], S.brushColor, S.splatterSize * RENDER_SCALE, splatterTarget, lastSplatterPressure);
            splatterRaf = requestAnimationFrame(splatterTick);
        }
        function startSplatter(p, e) {
            splatterTarget = p;
            lastSplatterPressure = splatterPressureFor(e);
            splatterRaf = requestAnimationFrame(splatterTick);
        }
        function stopSplatter() {
            if (splatterRaf !== null) cancelAnimationFrame(splatterRaf);
            splatterRaf = null;
            splatterTarget = null;
        }

        // ---- Ink Splat: stamps a blot on tap, and repeats a stamp each time
        // the pointer travels far enough from the previous one. ----
        let lastSplatStamp = null;
        function splatSizeFor(e) {
            let sz = S.splatSize * RENDER_SCALE * (0.8 + Math.random() * 0.4);
            if (e.pointerType === 'pen' && e.pressure > 0) sz *= 0.6 + e.pressure * 0.8;
            return sz;
        }

        // ---- Wet Quill: a nib whose width follows stroke SPEED (slow = wet
        // fat line, fast = thin dry one), pooling little blobs where the pen
        // starts, lingers, or lifts, and flicking rare stray flecks aside. ----
        let quillSmooth = null;   // smoothed width factor, reseeded per stroke
        let lastQuillTs = 0;
        let lastQuillSpeed = 0;
        function quillWidthFor(ev, p, prev) {
            const dt = Math.max(1, ev.timeStamp - lastQuillTs);
            lastQuillTs = ev.timeStamp;
            const dist = prev ? Math.hypot(p.x - prev.x, p.y - prev.y) : 0;
            lastQuillSpeed = dist / dt; // canvas px per ms
            // Exponential falloff, smoothed across samples so noisy pointer
            // timing doesn't make the line pulse.
            const target = 0.35 + 1.3 * Math.exp(-lastQuillSpeed / (1.2 * RENDER_SCALE));
            quillSmooth = quillSmooth === null ? target : quillSmooth + (target - quillSmooth) * 0.25;
            let w = S.quillSize * RENDER_SCALE * quillSmooth;
            if (ev.pointerType === 'pen' && ev.pressure > 0) w *= 0.55 + ev.pressure * 0.9;
            return Math.max(0.5, w);
        }
        // Pooling while lingering + rare stray flecks beside the line; shared
        // by pointerdown (always pools) and pointermove (chance-based).
        function quillInkEffects(p, w, isStart) {
            const ctx = ctxs[S.activeLayer];
            if (isStart) {
                inkStampQuillBlob(ctx, S.brushColor, w * (0.9 + Math.random() * 0.6), p.x, p.y);
                return;
            }
            if (lastQuillSpeed < 0.25 * RENDER_SCALE && Math.random() < 0.04) {
                inkStampQuillBlob(ctx, S.brushColor, w * (1.2 + Math.random() * 0.9), p.x, p.y);
            }
            if (Math.random() < 0.015) {
                const a = Math.random() * Math.PI * 2;
                const d = w * (2 + Math.random() * 5);
                inkStampQuillBlob(ctx, S.brushColor, Math.max(0.6, w * (0.12 + Math.random() * 0.25)), p.x + Math.cos(a) * d, p.y + Math.sin(a) * d);
            }
        }

        // ---- Stamp-engine presets (Watercolor family etc.) ----
        // Dry presets stamp straight onto the active layer. Wet presets stamp
        // into an offscreen buffer previewed on a transparent overlay canvas,
        // then composite onto the layer ONCE on lift-off (multiply at the
        // preset's opacity) — see the engine notes at BRUSH_PRESETS. Both
        // extra canvases are lazy: players who never pick a wet brush never
        // pay their memory (full canvas size, 8.4M px at 300 DPI).
        let presetState = null;   // { residual, dir } for the stroke in flight
        let wetActive = false;
        let wetBufferCanvas = null, wetBufferCtx = null;
        let previewCanvas = null, previewCtx = null;
        function ensureWetLayers() {
            if (!wetBufferCanvas) {
                wetBufferCanvas = document.createElement('canvas');
                wetBufferCanvas.width = CANVAS_W; wetBufferCanvas.height = CANVAS_H;
                wetBufferCtx = wetBufferCanvas.getContext('2d');
            }
            if (!previewCanvas) {
                previewCanvas = document.createElement('canvas');
                previewCanvas.width = CANVAS_W; previewCanvas.height = CANVAS_H;
                previewCanvas.className = 'layerCanvas block';
                previewCanvas.style.cssText = 'z-index:3; pointer-events:none';
                const stack = document.getElementById('canvasStack');
                const cursorLayer = document.getElementById('ocCursorLayer');
                if (cursorLayer) stack.insertBefore(previewCanvas, cursorLayer);
                else stack.appendChild(previewCanvas);
                previewCtx = previewCanvas.getContext('2d');
                fitPaper(); // size the new .layerCanvas member to the on-screen scale
            }
        }
        function presetBaseSize(preset) {
            return (S.presetSizes[S.tool] ?? preset.size) * RENDER_SCALE;
        }
        function blitWetPreview(preset) {
            previewCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            previewCtx.globalAlpha = preset.opacity;
            previewCtx.drawImage(wetBufferCanvas, 0, 0);
            previewCtx.globalAlpha = 1;
        }
        function finishWetStroke(preset) {
            const ctx = ctxs[S.activeLayer];
            ctx.globalCompositeOperation = 'multiply';
            ctx.globalAlpha = preset.opacity;
            ctx.drawImage(wetBufferCanvas, 0, 0);
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
            wetBufferCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            previewCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            wetActive = false;
        }

        // Undo snapshots stored as PNG data URLs (~50-200KB each vs 3.7MB raw)
        function pushUndo() {
            const layer = S.activeLayer;
            S.undoStacks[layer].push(canvases[layer].toDataURL('image/png'));
            if (S.undoStacks[layer].length > 20) S.undoStacks[layer].shift();
        }

        topCanvas.addEventListener('pointerdown', e => {
            e.preventDefault();

            // Palm rejection: once a pen has been seen, finger touches don't draw
            if (e.pointerType === 'pen') penSeen = true;
            else if (e.pointerType === 'touch' && penSeen) return;

            // Ignore extra simultaneous pointers (second finger, resting palm)
            if (activePointer !== null) return;

            // Brush is stylus-only — a mouse/finger has no pressure to taper with
            if (S.tool === 'brush' && e.pointerType !== 'pen') return;

            const p = pos(e);

            if (S.tool === 'fill') {
                pushUndo();
                floodFill(ctxs[S.activeLayer], Math.round(p.x), Math.round(p.y), S.brushColor);
                return;
            }

            pushUndo();
            activePointer = e.pointerId;
